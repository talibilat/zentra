<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentTrail</title>
  <!-- AGENT_TAIL_EXPORT_HEAD -->
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0e17;
      --panel: #111725;
      --panel2: #0d1320;
      --stage: #080b12;
      --grid: #141c2e;
      --line: #1e2940;
      --text: #e6edf7;
      --dim: #8896ad;
      --faint: #5a6883;
      --run: #33c9ff;
      --ok: #37e39b;
      --warn: #ffb454;
      --err: #ff5d6c;
      --idle: #5a6883;
      --accent: #7aa2ff;
      --accent2: #a7c0ff;
      --orch: #b18cff;
    }
    body.theme-light {
      color-scheme: light;
      --bg: #eef1f7;
      --panel: #ffffff;
      --panel2: #f3f5fa;
      --stage: #f7f9fd;
      --grid: #e2e8f2;
      --line: #dbe2ee;
      --text: #0f1626;
      --dim: #5a6478;
      --faint: #93a0b5;
      --run: #0a8bd6;
      --ok: #159a63;
      --warn: #c77d17;
      --err: #dc3b4c;
      --idle: #9aa6ba;
      --accent: #2f6bde;
      --accent2: #1c50b8;
      --orch: #7d4be0;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    button, input, select { font: inherit; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent2); }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    @keyframes at-pulse { 0% { box-shadow: 0 0 0 0 var(--glow); } 70% { box-shadow: 0 0 0 10px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
    @keyframes at-dash { to { stroke-dashoffset: -16; } }
    @keyframes at-blink { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 3px; background: var(--line); outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--run); cursor: pointer; box-shadow: 0 0 8px var(--run); }
    input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border: none; border-radius: 50%; background: var(--run); cursor: pointer; }

    .at-root { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
    .export-info {
      flex: none; display: flex; align-items: center; gap: 14px; padding: 7px 16px;
      border-bottom: 1px solid var(--line); background: rgba(122,162,255,.08);
      color: var(--dim); font: 500 10px "IBM Plex Mono", monospace; overflow-x: auto;
    }
    .export-info strong { color: var(--accent2); white-space: nowrap; }
    .export-info span { white-space: nowrap; }
    .export-info[hidden], #jump-live[hidden] { display: none; }
    .review-banner {
      flex: none; display: grid; grid-template-columns: minmax(180px, .7fr) minmax(360px, 2fr) auto;
      gap: 14px; align-items: center; padding: 10px 16px; border-bottom: 1px solid #8b6729;
      background: #2a2113; color: #fff3d6;
    }
    .review-banner[hidden] { display: none; }
    .review-title strong { display: block; font: 700 13px "IBM Plex Sans", sans-serif; }
    .review-title span { display: block; margin-top: 3px; color: #d6bd8a; font: 500 10px "IBM Plex Mono", monospace; }
    .review-inventory { display: flex; flex-wrap: wrap; gap: 4px 12px; min-width: 0; }
    .review-inventory span { color: #d6bd8a; font: 500 9.5px "IBM Plex Mono", monospace; overflow-wrap: anywhere; }
    .review-inventory strong { color: #fff3d6; }
    .review-actions { display: flex; gap: 8px; }
    .review-actions button { border-radius: 7px; padding: 8px 12px; cursor: pointer; font: 700 11px "IBM Plex Sans", sans-serif; }
    .review-approve { border: 1px solid var(--ok); background: var(--ok); color: #07170f; }
    .review-cancel { border: 1px solid #d6bd8a; background: transparent; color: #fff3d6; }
    .review-actions button:disabled { opacity: .55; cursor: default; }

    /* ===== TOP BAR ===== */
    header.topbar {
      position: relative;
      z-index: 30;
      height: 52px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 14px;
      flex: none;
    }
    .brand { display: flex; align-items: center; gap: 9px; flex: none; }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--orch), var(--run));
      color: #0a0e17; font: 600 12px "IBM Plex Mono", monospace;
    }
    .brand-name { font: 700 14px "IBM Plex Sans", sans-serif; letter-spacing: .3px; color: var(--text); }
    .brand-badge { font: 500 10px "IBM Plex Mono", monospace; color: var(--faint); border: 1px solid var(--line); padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
    .top-divider { width: 1px; height: 24px; background: var(--line); flex: none; }

    .run-picker { position: relative; }
    .run-picker-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel2); border: 1px solid var(--line); border-radius: 7px;
      padding: 6px 10px; cursor: pointer; color: var(--text); max-width: 320px;
    }
    .run-picker-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
    .run-picker-btn .title { font: 600 12px "IBM Plex Sans", sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-picker-btn .meta { font: 400 10px "IBM Plex Mono", monospace; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-picker-btn .chevron { color: var(--dim); font-size: 10px; flex: none; }
    .run-menu {
      position: absolute; top: 42px; left: 0; width: 300px; max-height: min(420px, calc(100vh - 70px));
      overflow-y: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 9px;
      padding: 6px; box-shadow: 0 18px 40px rgba(0,0,0,.5); z-index: 40;
    }
    .run-menu[hidden] { display: none; }
    .run-menu-label { font: 600 9px "IBM Plex Mono", monospace; color: var(--faint); letter-spacing: 1px; padding: 6px 8px 4px; }
    .run-row {
      display: flex; align-items: center; gap: 9px; width: 100%; padding: 9px 8px;
      border: none; border-radius: 7px; background: transparent; cursor: pointer; margin-bottom: 2px; text-align: left;
    }
    .run-row[aria-current="true"] { background: var(--panel2); }
    .run-row .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
    .run-row .body { flex: 1; min-width: 0; }
    .run-row .title { font: 600 12px "IBM Plex Sans", sans-serif; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-row .meta { font: 400 10px "IBM Plex Mono", monospace; color: var(--dim); }
    .run-row .badge { font: 600 8px "IBM Plex Mono", monospace; padding: 2px 5px; border-radius: 4px; flex: none; border: 1px solid; }

    .top-spacer { flex: 1; }
    .top-search {
      width: 220px; display: flex; align-items: center; gap: 7px;
      padding: 6px 10px; border: 1px solid var(--line); border-radius: 7px; background: var(--panel2);
    }
    .top-search span { color: var(--faint); font-size: 12px; }
    .top-search input { min-width: 0; width: 100%; border: 0; outline: 0; background: transparent; color: var(--text); font: 400 12px "IBM Plex Mono", monospace; }
    .warning-button {
      display: flex; align-items: center; gap: 7px; border: 1px solid var(--line); border-radius: 7px;
      padding: 6px 11px; cursor: pointer; background: var(--panel2); color: var(--text);
    }
    .warning-button.has-warnings { background: rgba(255,180,84,.1); border-color: var(--warn); }
    .warning-button .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex: none; }
    .warning-button .count { font: 600 12px "IBM Plex Sans", sans-serif; }
    .warning-button .label { font: 500 11px "IBM Plex Sans", sans-serif; opacity: .8; }
    .theme-button {
      width: 34px; height: 34px; border-radius: 8px; background: var(--panel2); border: 1px solid var(--line);
      cursor: pointer; color: var(--dim); font-size: 14px; flex: none;
    }

    /* ===== METRICS STRIP ===== */
    .metric-row { display: flex; gap: 0; height: 74px; border-bottom: 1px solid var(--line); background: var(--panel2); flex: none; overflow-x: auto; }
    .metric {
      flex: 1; min-width: 150px; padding: 12px 16px; border-right: 1px solid var(--line);
      display: flex; flex-direction: column; justify-content: center;
    }
    .metric .label { font: 500 9.5px "IBM Plex Mono", monospace; color: var(--faint); letter-spacing: .8px; }
    .metric .value-row { display: flex; align-items: baseline; gap: 6px; margin-top: 5px; }
    .metric .value { font: 600 22px "IBM Plex Mono", monospace; line-height: 1; }
    .metric .unit { font: 500 11px "IBM Plex Sans", sans-serif; color: var(--dim); }
    .metric .sub { font: 400 10px "IBM Plex Mono", monospace; color: var(--faint); margin-top: 3px; }

    /* ===== BODY ===== */
    main.workspace { flex: 1; display: flex; min-height: 0; }

    .stage-shell { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    .stage-head { display: flex; align-items: center; gap: 4px; padding: 8px 14px; border-bottom: 1px solid var(--line); background: var(--panel); flex: none; }
    .view-tabs { display: flex; align-items: center; gap: 4px; }
    .view-tabs button {
      display: flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 8px; cursor: pointer;
      font: 600 12px "IBM Plex Sans", sans-serif; border: 1px solid transparent; background: transparent; color: var(--dim);
    }
    .view-tabs button[aria-current="true"] { border-color: var(--accent); background: rgba(122,162,255,.12); color: var(--accent); }
    .view-tabs button .icon { font-size: 13px; }
    .stage-head-spacer { flex: 1; }
    .focus-banner {
      display: flex; align-items: center; gap: 6px; background: rgba(122,162,255,.12); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 7px; padding: 6px 11px; cursor: pointer; font: 600 11px "IBM Plex Sans", sans-serif;
    }
    .zoom-label { font: 400 10px "IBM Plex Mono", monospace; color: var(--faint); margin-left: 8px; }
    .reset-btn { background: var(--panel2); border: 1px solid var(--line); color: var(--dim); border-radius: 7px; padding: 6px 10px; cursor: pointer; font: 500 11px "IBM Plex Sans", sans-serif; margin-left: 8px; }

    .stage-content { position: relative; min-height: 0; flex: 1; overflow: hidden; }
    .view-stage {
      position: absolute; inset: 0; overflow: hidden; background-color: var(--stage);
      background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
      background-size: 26px 26px;
    }
    .view-stage[hidden] { display: none !important; }
    .view-canvas { position: absolute; left: 0; top: 0; }
    .edge-layer { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }
    .edge-layer path { fill: none; }
    .unresolved-node { border: 1px dashed var(--warn); border-radius: 8px; background: var(--panel); color: var(--warn); padding: 5px 8px; font: 500 9px "IBM Plex Mono", monospace; transform: translate(-50%, -50%); }

    .node-wrap { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: opacity .25s; background: none; border: none; padding: 0; }
    .node-dot { position: relative; display: flex; align-items: center; justify-content: center; background: var(--panel); }
    .node-ring { position: absolute; inset: -2px; }
    .node-glyph { font: 600 11px "IBM Plex Mono", monospace; }
    .node-label { text-align: center; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; box-shadow: 0 2px 6px rgba(0,0,0,.3); }
    .node-label .id { font: 600 11px "IBM Plex Sans", sans-serif; color: var(--text); white-space: nowrap; }
    .node-label .role { font: 400 9px "IBM Plex Mono", monospace; color: var(--dim); white-space: nowrap; }
    .node-warn { position: absolute; top: -6px; right: -6px; font: 600 8px "IBM Plex Mono", monospace; color: #0a0e17; background: var(--warn); padding: 2px 5px; border-radius: 5px; box-shadow: 0 0 8px var(--warn); }

    .dense-note { position: absolute; right: 14px; top: 14px; z-index: 8; font: 500 9px "IBM Plex Mono", monospace; color: var(--faint); border: 1px solid var(--line); padding: 4px 8px; border-radius: 999px; background: var(--panel); cursor: pointer; }

    .swimlane, .sequence-view { position: absolute; inset: 0; overflow: auto; }
    .swimlane-inner { position: relative; min-width: 920px; padding: 0 0 20px; }
    .time-axis { position: sticky; top: 0; height: 26px; display: flex; background: var(--panel); border-bottom: 1px solid var(--line); z-index: 5; margin-left: 150px; }
    .time-tick { flex: none; font: 400 9px "IBM Plex Mono", monospace; color: var(--faint); padding: 8px 0 0 4px; border-left: 1px solid var(--line); }
    .lane-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--line); cursor: pointer; background: transparent; width: 100%; text-align: left; border-left: none; border-right: none; border-top: none; }
    .lane-row[aria-current="true"] { background: rgba(122,162,255,.06); }
    .lane-head { width: 150px; flex: none; display: flex; align-items: center; gap: 8px; padding: 0 12px; border-right: 1px solid var(--line); background: var(--panel); }
    .lane-head .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
    .lane-head .id { font: 600 11px "IBM Plex Sans", sans-serif; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lane-head .role { font: 400 9px "IBM Plex Mono", monospace; color: var(--dim); }
    .lane-track { position: relative; flex: 1; height: 38px; }
    .lane-span { position: absolute; top: 11px; height: 16px; border-radius: 3px; opacity: .85; }
    .playhead { position: absolute; top: 26px; bottom: 0; width: 2px; background: var(--run); box-shadow: 0 0 8px var(--run); z-index: 6; pointer-events: none; }

    .sequence-inner { position: relative; padding: 34px 20px 30px; min-height: 100%; }
    .fleet-view { position: absolute; inset: 0; overflow: auto; padding: 16px; background: var(--stage); }
    .fleet-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 12px; max-width: 1400px; margin: 0 auto; }
    .fleet-card { grid-column: span 4; min-width: 0; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); padding: 14px; }
    .fleet-card.wide { grid-column: span 8; }
    .fleet-card.full { grid-column: 1 / -1; }
    .fleet-card h3 { margin: 0 0 10px; color: var(--faint); font: 700 10px "IBM Plex Mono", monospace; letter-spacing: 1px; text-transform: uppercase; }
    .fleet-stat { display: flex; gap: 8px; align-items: baseline; margin-bottom: 8px; }
    .fleet-stat strong { color: var(--text); font: 700 24px "IBM Plex Mono", monospace; }
    .fleet-stat span, .fleet-row { color: var(--dim); font: 500 10px/1.5 "IBM Plex Mono", monospace; }
    .fleet-row { display: grid; grid-template-columns: minmax(8rem, 1fr) auto auto; gap: 10px; padding: 7px 0; border-top: 1px solid var(--line); overflow-wrap: anywhere; }
    .fleet-row:first-of-type { border-top: 0; }
    .fleet-row .stale, .fleet-row .degraded { color: var(--err); }
    .fleet-row .active, .fleet-row .healthy { color: var(--ok); }
    .fleet-row .advisory { color: var(--warn); }
    .fleet-dag { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .fleet-node { padding: 4px 7px; border: 1px solid var(--line); border-radius: 6px; color: var(--text); font: 600 10px "IBM Plex Mono", monospace; }
    .fleet-table { width: 100%; table-layout: fixed; border-collapse: collapse; font: 500 9.5px/1.45 "IBM Plex Mono", monospace; }
    .fleet-table th, .fleet-table td { min-width: 0; padding: 7px 5px; border-top: 1px solid var(--line); text-align: right; overflow-wrap: anywhere; }
    .fleet-table thead th { border-top: 0; color: var(--faint); font-weight: 600; }
    .fleet-table th:first-child, .fleet-table td:first-child { width: 28%; text-align: left; color: var(--text); }
    .fleet-table td[data-available="false"] { color: var(--faint); }
    .seq-col-head { position: absolute; top: 6px; transform: translateX(-50%); display: flex; align-items: center; gap: 5px; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; white-space: nowrap; }
    .seq-col-head .dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
    .seq-col-head .id { font: 600 10px "IBM Plex Sans", sans-serif; color: var(--text); }
    .seq-line { position: absolute; top: 34px; bottom: 20px; width: 1px; background: var(--line); }
    .seq-arrow-label { position: absolute; font: 400 9px "IBM Plex Mono", monospace; color: var(--dim); background: var(--stage); padding: 1px 4px; }
    .seq-empty { padding: 20px; color: var(--faint); font: 400 11px "IBM Plex Mono", monospace; }

    .legend { position: absolute; left: 14px; bottom: 14px; display: flex; gap: 12px; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; z-index: 8; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-item .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .legend-item span.label { font: 500 10px "IBM Plex Sans", sans-serif; color: var(--dim); }

    /* ===== TRANSPORT ===== */
    .transport { height: 60px; flex: none; padding: 0 16px; border-top: 1px solid var(--line); background: var(--panel); display: flex; align-items: center; gap: 14px; }
    #playback-toggle { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--line); background: var(--run); color: #0a0e17; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; flex: none; }
    .transport-clock { display: flex; flex-direction: column; gap: 2px; align-items: center; width: 104px; flex: none; }
    .transport-clock strong { font: 600 13px "IBM Plex Mono", monospace; color: var(--text); }
    .transport-clock span { font: 400 9px "IBM Plex Mono", monospace; color: var(--faint); }
    #scrubber { flex: 1; }
    .speed-group { display: flex; gap: 6px; align-items: center; flex: none; }
    .speed-group button { background: var(--panel2); color: var(--dim); border: 1px solid var(--line); border-radius: 6px; padding: 5px 8px; cursor: pointer; font: 600 10px "IBM Plex Mono", monospace; }
    .speed-group button[aria-current="true"] { background: var(--accent); color: #0a0e17; }
    #jump-live { display: flex; align-items: center; background: var(--panel2); border: 1px solid var(--line); color: var(--dim); border-radius: 7px; padding: 7px 11px; cursor: pointer; font: 600 11px "IBM Plex Mono", monospace; flex: none; }
    #jump-live.live { background: rgba(55,227,155,.12); border-color: var(--ok); color: var(--ok); }
    #jump-live .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--idle); display: inline-block; margin-right: 5px; }
    #jump-live.live .dot { background: var(--ok); }

    /* ===== INSPECTOR ===== */
    .inspector-shell { width: 376px; flex: none; border-left: 1px solid var(--line); background: var(--panel); overflow-y: auto; overflow-x: hidden; }
    .inspector-header { padding: 16px 16px 14px; border-bottom: 1px solid var(--line); }
    .inspector-header .row { display: flex; align-items: center; gap: 10px; }
    .inspector-avatar { flex: none; display: flex; align-items: center; justify-content: center; font: 600 14px "IBM Plex Mono", monospace; }
    .inspector-title-block { flex: 1; min-width: 0; }
    .inspector-title-block strong { display: block; font: 600 15px "IBM Plex Sans", sans-serif; color: var(--text); }
    .inspector-title-block span { font: 400 11px "IBM Plex Mono", monospace; color: var(--dim); }
    .status-pill { font: 600 10px "IBM Plex Mono", monospace; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; border: 1px solid; }
    .inspector-actions { display: flex; gap: 8px; margin-top: 12px; }
    .inspector-actions .focus-btn { flex: 1; background: rgba(122,162,255,.12); border: 1px solid var(--accent); color: var(--accent); border-radius: 7px; padding: 7px; cursor: pointer; font: 600 11px "IBM Plex Sans", sans-serif; }
    .inspector-actions .close-btn { background: var(--panel2); border: 1px solid var(--line); color: var(--dim); border-radius: 7px; padding: 7px 11px; cursor: pointer; font: 600 11px "IBM Plex Sans", sans-serif; }
    .inspector-block { padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .inspector-block:last-child { border-bottom: 0; }
    .inspector-label { font: 600 9.5px "IBM Plex Mono", monospace; color: var(--faint); letter-spacing: 1px; margin-bottom: 10px; }
    .usage-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .usage-card { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 9px; }
    .usage-card .k { font: 400 9px "IBM Plex Mono", monospace; color: var(--dim); }
    .usage-card .v { font: 600 16px "IBM Plex Mono", monospace; margin-top: 3px; }
    .spark-label { font: 400 9px "IBM Plex Mono", monospace; color: var(--faint); margin: 12px 0 6px; }
    .spark-row { display: flex; align-items: flex-end; gap: 3px; height: 44px; }
    .spark-bar { flex: 1; border-radius: 2px; }
    .orch-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .orch-row.children { align-items: flex-start; }
    .orch-row .tag { font: 400 10px "IBM Plex Mono", monospace; color: var(--dim); width: 64px; flex: none; }
    .orch-row.children .tag { padding-top: 4px; }
    .chip-btn { background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; padding: 4px 9px; cursor: pointer; font: 500 11px "IBM Plex Mono", monospace; display: inline-flex; align-items: center; gap: 5px; }
    .chip-btn.parent { color: var(--accent); }
    .chip-btn.child { color: var(--text); }

    @media (max-width: 900px) { .fleet-card, .fleet-card.wide { grid-column: span 6; } }

    .overview-desc { font: 400 12.5px/1.7 "IBM Plex Sans", sans-serif; color: var(--dim); }

    /* ===== WARNINGS DRAWER ===== */

    .warnings-backdrop[hidden] { display: none; }

</head>
<body>
  <div class="at-root">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">AT</span>
        <span class="brand-name">AGENT&nbsp;TAIL</span>
        <span class="brand-badge">FLIGHT&nbsp;RECORDER</span>
      </div>
      <span class="top-divider"></span>
      <div class="run-picker">
        <button type="button" id="run-picker-btn" class="run-picker-btn"></button>
        <div id="run-menu" class="run-menu" hidden></div>
      </div>
      <div class="top-spacer"></div>
      <label class="top-search"><span>&#8981;</span><input id="search" type="search" placeholder="filter agents, kinds, traces&hellip;"></label>
      <button type="button" id="warning-button" class="warning-button" aria-label="Warnings">
        <span class="dot"></span>
        <span id="warning-count" class="count">0</span>
        <span class="label">warnings</span>
      </button>
      <button type="button" id="theme-button" class="theme-button" aria-label="Theme">&#9728;</button>
    </header>
    <section id="export-info" class="export-info" aria-label="Export information" hidden></section>
    <section id="review-banner" class="review-banner" aria-label="Export review" hidden>
      <div class="review-title"><strong>REVIEW BEFORE EXPORT</strong><span id="review-target"></span></div>
      <div id="review-inventory" class="review-inventory"></div>
      <div class="review-actions">
        <button type="button" id="review-cancel" class="review-cancel">Cancel</button>
        <button type="button" id="review-approve" class="review-approve">Approve export</button>
      </div>
    </section>

    <div id="metrics" class="metric-row"></div>

    <main class="workspace">
      <section class="stage-shell" aria-label="Orchestration visualization">
        <div class="stage-head">
          <div class="view-tabs" id="view-tabs" aria-label="Run views">
            <button type="button" data-view="graph" aria-label="Graph"><span class="icon">⬡</span><span>Graph</span></button>
            <button type="button" data-view="tree" aria-label="Tree"><span class="icon">⊢</span><span>Tree</span></button>
            <button type="button" data-view="swimlane" aria-label="Swimlane"><span class="icon">▤</span><span>Swimlane</span></button>
            <button type="button" data-view="sequence" aria-label="Sequence"><span class="icon">⇄</span><span>Sequence</span></button>
            <button type="button" data-view="fleet" aria-label="Fleet"><span class="icon">▦</span><span>Fleet</span></button>
          </div>
          <div class="stage-head-spacer"></div>
          <button type="button" id="focus-banner" class="focus-banner" data-action="clear-focus" hidden></button>
          <span id="zoom-label" class="zoom-label">100%</span>
          <button type="button" id="reset-btn" class="reset-btn" data-action="reset">reset</button>
        </div>
        <div class="stage-content">
          <div id="stage" class="view-stage"></div>
          <div id="swimlane" class="swimlane" hidden></div>
          <div id="sequence" class="sequence-view" hidden></div>
          <div id="fleet" class="fleet-view" hidden aria-label="Pod and fleet status"></div>
          <div id="legend" class="legend"></div>
        </div>
        <div class="transport">
          <button type="button" id="playback-toggle">&#9654;</button>
          <div class="transport-clock"><strong id="playback-clock">00:00 / 00:00</strong><span id="playback-mode">streaming</span></div>
          <input id="scrubber" type="range" min="0" max="1000" step="1" value="0">
          <div class="speed-group" id="speed"></div>
          <button type="button" id="jump-live" aria-label="Jump to live"><span class="dot"></span>LIVE</button>
        </div>
      </section>
      <aside class="inspector-shell">
        <section id="inspector" aria-label="Inspector"></section>
      </aside>
    </main>
    <div id="warnings-backdrop" class="warnings-backdrop" hidden></div>
    <section id="warnings-drawer" class="warnings-drawer" hidden role="dialog" aria-modal="true" aria-label="Warnings drawer"></section>
  </div>
  <!-- AGENT_TAIL_EXPORT_DATA -->
  <script>
    const runPickerBtnEl = document.querySelector('#run-picker-btn');
    const runMenuEl = document.querySelector('#run-menu');
    const metricsEl = document.querySelector('#metrics');
    const viewTabsEl = document.querySelector('#view-tabs');
    const focusBannerEl = document.querySelector('#focus-banner');
    const zoomLabelEl = document.querySelector('#zoom-label');
    const resetBtnEl = document.querySelector('#reset-btn');
    const stageEl = document.querySelector('#stage');
    const swimlaneEl = document.querySelector('#swimlane');
    const sequenceEl = document.querySelector('#sequence');
    const fleetEl = document.querySelector('#fleet');
    const legendEl = document.querySelector('#legend');
    const warningButtonEl = document.querySelector('#warning-button');
    const warningCountEl = document.querySelector('#warning-count');
    const playbackToggleEl = document.querySelector('#playback-toggle');
    const playbackClockEl = document.querySelector('#playback-clock');
    const playbackModeEl = document.querySelector('#playback-mode');
    const scrubberEl = document.querySelector('#scrubber');
    const speedGroupEl = document.querySelector('#speed');
    const jumpLiveEl = document.querySelector('#jump-live');
    const searchEl = document.querySelector('#search');
    const inspectorEl = document.querySelector('#inspector');
    const warningsDrawerEl = document.querySelector('#warnings-drawer');
    const warningsBackdropEl = document.querySelector('#warnings-backdrop');
    const themeButtonEl = document.querySelector('#theme-button');
    const exportInfoEl = document.querySelector('#export-info');
    const reviewBannerEl = document.querySelector('#review-banner');
    const reviewTargetEl = document.querySelector('#review-target');
    const reviewInventoryEl = document.querySelector('#review-inventory');
    const reviewApproveEl = document.querySelector('#review-approve');
    const reviewCancelEl = document.querySelector('#review-cancel');
    const svgNamespace = `http${'://'}www.w3.org/2000/svg`;

    const STATUS_COLOR = { idle: '--idle', running: '--run', waiting: '--warn', done: '--ok', error: '--err', stalled: '--warn' };
    const SPEEDS = [[0.5, '0.5×'], [1, '1×'], [3, '3×']];

    let selectedTraceId = null;
    const requestedView = new URLSearchParams(window.location.search).get('view');
    let selectedView = ['graph', 'tree', 'swimlane', 'sequence', 'fleet'].includes(requestedView) ? requestedView : 'graph';
    let selectedAgentId = null;
    let selectedEventId = null;
    let focusedAgentId = null;
    let warningsOpen = false;
    let visibleLimit = initialVisibleLimit();
    let currentDetail = null;
    let viewTransform = { scale: 1, x: 0, y: 0 };
    let playbackTraceId = null;
    let playbackTime = null;
    let liveFollow = true;
    let playing = false;
    let playbackTimer = null;
    let playbackSpeed = 1;
    let cursor = 0;
    let events = null;
    let reconnectTimer = null;
    let runMenuOpen = false;
    let dragPoint = null;
    let fitDone = { view: null, trace: null };
    const accessToken = new URLSearchParams(window.location.search).get('token');
    const reviewMode = new URLSearchParams(window.location.search).get('review') === '1';
    const snapshotMode = new URLSearchParams(window.location.search).get('snapshot') === '1';
    let reviewFinished = false;
    let reviewCancelSent = false;
    let reviewHeartbeat = null;
    const embeddedDataEl = document.querySelector('#agent-tail-export-data');

    class ApiDataProvider {
      constructor() { this.live = !reviewMode && !snapshotMode; this.supportsLazyPayload = true; this.metadata = null; }
      async getJson(path) {
        const response = await fetch(apiPath(path), { headers: { Accept: 'application/json' } });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        return response.json();
      }
    }

    class EmbeddedDataProvider {
      constructor(element) {
        const bytes = Uint8Array.from(atob(element.textContent.trim()), (character) => character.charCodeAt(0));
        this.snapshot = JSON.parse(new TextDecoder().decode(bytes));
        this.live = false;
        this.supportsLazyPayload = false;
        this.metadata = this.snapshot.metadata;
      }
      async getJson(path) {
        if (path === '/api/v1/runs') return this.snapshot.runs;
        const match = path.match(/^\/api\/v1\/runs\/([^/]+)$/);
        if (match) return this.snapshot.details[decodeURIComponent(match[1])];
        throw new Error('Embedded exports do not support server operations');
      }
    }

    const dataProvider = embeddedDataEl
      ? new EmbeddedDataProvider(embeddedDataEl)
      : new ApiDataProvider();
    if (!dataProvider.live) {
      jumpLiveEl.hidden = true;
      if (dataProvider.metadata) renderExportInfo(dataProvider.metadata);
    }

        if (playing) startPlaybackTimer();
        renderDetail(currentDetail);
      });
      button.dataset.speed = String(value);
      speedGroupEl.append(button);
    });

    scrubberEl.addEventListener('input', () => {

      playbackTime = (Number(scrubberEl.value) / 1000) * duration;
      liveFollow = false;
      setPlaying(false);
      renderDetail(currentDetail);
    });
    jumpLiveEl.addEventListener('click', () => {
      liveFollow = true;
      playbackTime = durationOf(currentDetail);

      renderDetail(currentDetail);
    });
    searchEl.addEventListener('input', () => renderDetail(currentDetail));
    warningButtonEl.addEventListener('click', () => { warningsOpen = !warningsOpen; renderDetail(currentDetail); });
    warningsBackdropEl.addEventListener('click', () => { warningsOpen = false; renderDetail(currentDetail); });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && warningsOpen) { warningsOpen = false; renderDetail(currentDetail); }
    });
    themeButtonEl.addEventListener('click', () => {
      document.body.classList.toggle('theme-light');
      themeButtonEl.innerHTML = document.body.classList.contains('theme-light') ? '&#9790;' : '&#9728;';
    });
    focusBannerEl.addEventListener('click', () => { focusedAgentId = null; renderDetail(currentDetail); });
    resetBtnEl.addEventListener('click', () => { fitView(); renderDetail(currentDetail); });
    stageEl.addEventListener('wheel', (event) => {
      if (!['graph', 'tree'].includes(selectedView)) return;
      event.preventDefault();
      const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
      viewTransform.scale = Math.max(0.4, Math.min(2.4, viewTransform.scale * factor));
      renderDetail(currentDetail);
    }, { passive: false });
    stageEl.addEventListener('pointerdown', (event) => {
      if (event.target.closest('button')) return;
      dragPoint = { x: event.clientX, y: event.clientY, px: viewTransform.x, py: viewTransform.y };
      stageEl.setPointerCapture(event.pointerId);
    });
    stageEl.addEventListener('pointermove', (event) => {
      if (!dragPoint) return;
      viewTransform.x = dragPoint.px + (event.clientX - dragPoint.x);
      viewTransform.y = dragPoint.py + (event.clientY - dragPoint.y);
      renderDetail(currentDetail);
    });
    stageEl.addEventListener('pointerup', () => { dragPoint = null; });
    stageEl.addEventListener('pointercancel', () => { dragPoint = null; });

    async function fetchJson(path) {
      return dataProvider.getJson(path);
    }

    function renderExportInfo(metadata) {
      exportInfoEl.hidden = false;
      const generated = metadata.generated_at || 'omitted for deterministic output';
      const retention = Object.entries(metadata.payload_retention)
        .map(([state, count]) => `${state} ${count}`).join(' · ');
      const values = [
        ['AgentTrail', metadata.agent_tail_version],
        ['mode', metadata.export_mode],
        ['schemas', metadata.schema_versions.join(', ') || 'none'],
        ['redaction', `ruleset ${metadata.redaction_ruleset}`],
        ['payloads', retention],
        ['generated', generated],
      ];
      if (metadata.warning_policy) {
        const policy = metadata.warning_policy;
        values.push(
          ['warning policy', `${policy.path} · version ${policy.version} · restart required`],
          ['suppressed', policy.suppressed_counts.total],
        );
      }
      exportInfoEl.replaceChildren(...values.map(([label, value], index) => {
        const item = document.createElement(index === 0 ? 'strong' : 'span');
        item.textContent = `${label}: ${value}`;
        return item;
      }));

    async function initReview() {
      if (!reviewMode) return;
      const review = await fetchJson('/api/v1/review');
      reviewBannerEl.hidden = false;
      if (!reviewHeartbeat) {
        reviewHeartbeat = window.setInterval(() => {
          fetchJson('/api/v1/review/heartbeat').catch(() => {});
        }, 500);
      }
      reviewTargetEl.textContent = `${review.target_format} · ${review.target_path}`;
      const values = [
        ['sha256', review.candidate_digest],
        ['candidate', `${review.candidate_bytes} bytes`],
        ['events', review.event_count],
        ['actors', review.actor_count],
        ['warnings', review.warning_count],
        ['ingestion errors', review.ingestion_errors],
        ['attributes', review.retained_attribute_paths.join(', ') || 'none'],
        ['payloads', Object.entries(review.payload_states).map(([state, count]) => `${state} ${count}`).join(', ') || 'none'],
        ['original payload', `${review.original_payload_bytes} bytes`],
        ['redaction', `ruleset ${review.redaction_ruleset}`],
        ['metadata-only', review.metadata_only ? 'yes · bodies omitted' : 'no'],
      ];
      if (review.warning_policy) {
        const policy = review.warning_policy;
        values.push(
          ['warning policy', `${policy.path} · version ${policy.version} · restart required`],
          ['suppressed', policy.suppressed_counts.total],
        );
      }
      reviewInventoryEl.replaceChildren(...values.map(([label, value]) => {
        const item = document.createElement('span');
        const key = document.createElement('strong');
        key.textContent = `${label}: `;
        item.append(key, document.createTextNode(String(value)));
        return item;
      }));

    async function finishReview(action) {
      if (reviewFinished) return;
      reviewApproveEl.disabled = true;
      reviewCancelEl.disabled = true;
      try {
        const response = await fetch(apiPath(`/api/v1/review/${action}`), {
          method: 'POST',
          headers: { Accept: 'application/json' },
        });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        reviewFinished = true;
        if (reviewHeartbeat) window.clearInterval(reviewHeartbeat);
        reviewTargetEl.textContent = action === 'approve' ? 'Approved. The exact candidate is being written.' : 'Cancelled. The destination is unchanged.';
      } catch (error) {
        reviewApproveEl.disabled = false;
        reviewCancelEl.disabled = false;
        reviewTargetEl.textContent = `Decision failed: ${error.message}`;
      }
    }

    reviewApproveEl.addEventListener('click', () => finishReview('approve'));
    reviewCancelEl.addEventListener('click', () => finishReview('cancel'));
    function cancelReviewOnClose() {
      if (!reviewMode || reviewFinished || reviewCancelSent) return;
      reviewCancelSent = true;
      if (reviewHeartbeat) window.clearInterval(reviewHeartbeat);
      navigator.sendBeacon(apiPath('/api/v1/review/cancel'), '');
    }
    window.addEventListener('pagehide', cancelReviewOnClose);
    window.addEventListener('beforeunload', cancelReviewOnClose);

    function text(value) {

    function runBadge(run) {
      if (run.state === 'live') return { label: 'LIVE', color: '--ok' };
      if (run.state === 'failed') return { label: 'FAILED', color: '--err' };
      return { label: 'ENDED', color: '--idle' };
    }

    function renderRuns(data) {
      cursor = Math.max(cursor, data.cursor);
      if (selectedTraceId === null && data.runs.length) selectedTraceId = data.runs[0].trace_id;
      const current = data.runs.find((run) => run.trace_id === selectedTraceId) || data.runs[0];
      if (!current) {
        runPickerBtnEl.innerHTML = '';
        runMenuEl.replaceChildren();
        return;
      }
      const badge = runBadge(current);
      runPickerBtnEl.innerHTML = `
        <span class="dot" style="background:${cssVar(badge.color)}"></span>
        <span class="title">${escapeHtml(current.trace_id)}</span>
        <span class="meta">${escapeHtml(current.state)}</span>
        <span class="chevron">▾</span>`;
      runPickerBtnEl.onclick = () => { runMenuOpen = !runMenuOpen; renderRuns(data); };
      runMenuEl.hidden = !runMenuOpen;

    function runRow(run, active) {
      const badge = runBadge(run);
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'run-row';
      button.setAttribute('aria-current', active ? 'true' : 'false');

      button.innerHTML = `
        <span class="dot" style="background:${cssVar(badge.color)}"></span>
        <div class="body">
          <div class="title">${escapeHtml(run.trace_id)}</div>

        </div>

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    async function selectRun(traceId) {
      selectedTraceId = traceId;
      selectedAgentId = null;
      selectedEventId = null;
      focusedAgentId = null;
      viewTransform = { scale: 1, x: 0, y: 0 };
      const runs = await fetchJson('/api/v1/runs');
      renderRuns(runs);
      const detail = await fetchJson(`/api/v1/runs/${encodeURIComponent(traceId)}`);
      renderDetail(detail);
    }

    function renderDetail(detail) {
      if (!detail) return;
      currentDetail = detail;
      cursor = Math.max(cursor, detail.cursor);
      syncPlayback(detail);

      const run = detail.run;
      const visibleEvents = eventsAtHorizon(detail);
      const horizonAgents = agentsAtHorizon(detail, visibleEvents);
      const warnings = warningsAtHorizon(detail, visibleEvents);
      const problems = warnings.length + findingsAtHorizon(detail, visibleEvents).length;
      warningCountEl.textContent = String(problems);
      warningButtonEl.classList.toggle('has-warnings', problems > 0);

      const modelReq = visibleEvents.filter((event) => event.kind === 'model.request.started' || event.kind === 'model.request').length;
      const toolReq = visibleEvents.filter((event) => event.kind.startsWith('tool.call.started') || event.kind === 'tool.call.failed').length;
      const msgReq = visibleEvents.filter((event) => event.kind.startsWith('message.')).length;
      const requests = modelReq + toolReq;
      const usage = usageFor(visibleEvents);
      const elapsed = Math.max(playbackTime || 0, 0);
      const duration = Math.max(durationOf(detail), 0.0001);
      const throughput = elapsed > 0 ? requests / elapsed : 0;
      const spawned = horizonAgents.length;

      metricsEl.replaceChildren(
        metric('AGENTS', spawned, `/ ${run.actor_count}`, `${horizonAgents.filter((a) => ['running', 'waiting', 'stalled'].includes(a.status)).length} active · ${horizonAgents.filter((a) => a.status === 'done').length} done`, '--orch'),
        metric('REQUESTS', requests, 'calls', `${modelReq} model · ${toolReq} tool`, '--run'),
        metric('TOKENS', usageValue(usage.total_tokens), 'tok', `${usageValue(usage.input_tokens)} in · ${usageValue(usage.output_tokens)} out`, '--ok'),
        metric('EST. COST', costValue(usage.cost_usd, 2), 'usd', 'ruleset v1 redaction on', '--warn'),
        metric('THROUGHPUT', throughput.toFixed(1), 'req/s', `msgs ${msgReq}`, '--run'),
        metric('ELAPSED', clock(elapsed), '', `of ${clock(duration)}`, '--text'),
        metric('WARNINGS', problems, '', 'loop/retry/stall', problems ? '--warn' : '--dim')
      );

      renderInspector(detail, horizonAgents, warnings);
      renderWarningsDrawer(detail, warnings, findingsAtHorizon(detail, visibleEvents));
      renderVisualView(detail, horizonAgents);
    }

    function metric(label, value, unit, sub, colorVar) {
      const node = document.createElement('div');
      node.className = 'metric';
      node.innerHTML = `
        <div class="label">${label}</div>
        <div class="value-row"><div class="value" style="color:${cssVar(colorVar)}">${value}</div><div class="unit">${unit}</div></div>
        <div class="sub">${sub}</div>`;
      return node;
    }

    function warningsAtHorizon(detail, visibleEvents) {
      const visibleIds = new Set(visibleEvents.map((event) => event.event_id));
      return detail.warnings.filter((warning) => !warning.event_id || visibleIds.has(warning.event_id));
    }

    function findingsAtHorizon(detail, visibleEvents) {
      const visibleIds = new Set(visibleEvents.map((event) => event.event_id));
      return detail.findings.filter((finding) => !finding.event_id || visibleIds.has(finding.event_id));
    }

    function renderVisualView(detail, horizonAgents) {
      [...viewTabsEl.querySelectorAll('button')].forEach((button) => {
        button.setAttribute('aria-current', button.dataset.view === selectedView ? 'true' : 'false');
      });
      stageEl.hidden = selectedView === 'swimlane' || selectedView === 'sequence' || selectedView === 'fleet';
      swimlaneEl.hidden = selectedView !== 'swimlane';
      sequenceEl.hidden = selectedView !== 'sequence';
      fleetEl.hidden = selectedView !== 'fleet';
      legendEl.hidden = selectedView === 'swimlane' || selectedView === 'sequence' || selectedView === 'fleet';

      focusBannerEl.hidden = !focusedAgentId;
      if (focusedAgentId) focusBannerEl.innerHTML = `◎ focus: ${escapeHtml(focusedAgentId)} ✕`;

      if (fitDone.view !== selectedView || fitDone.trace !== detail.run.trace_id) {
        fitDone = { view: selectedView, trace: detail.run.trace_id };
        setTimeout(() => { fitView(); renderDetail(currentDetail); }, 30);
      }

      if (selectedView === 'graph' || selectedView === 'tree') {
        renderNodeLink(detail, horizonAgents);
      } else if (selectedView === 'swimlane') {
        renderSwimlane(detail, horizonAgents);
      } else if (selectedView === 'sequence') {
        renderSequence(detail, horizonAgents);
      } else {
        renderFleet(detail.fleet || {});
      }
      renderLegend();
    }

      const budgetRows = [

    /* ---------- FOREST / LAYOUT ---------- */
    function buildForest(actors) {
      const byId = new Map(actors.map((agent) => [agent.id, agent]));
      const childrenMap = new Map();
      actors.forEach((agent) => childrenMap.set(agent.id, (agent.child_ids || []).filter((id) => byId.has(id))));
      const hasParent = new Set();
      actors.forEach((agent) => { if (agent.parent_id && byId.has(agent.parent_id)) hasParent.add(agent.id); });
      const roots = actors.filter((agent) => !hasParent.has(agent.id)).map((agent) => agent.id);
      const depth = new Map();
      const assignDepth = (id, d) => { depth.set(id, d); (childrenMap.get(id) || []).forEach((c) => assignDepth(c, d + 1)); };
      roots.forEach((r) => assignDepth(r, 0));
      return { byId, childrenMap, roots, depth };
    }

    function leafCount(id, childrenMap, leaves) {
      const kids = childrenMap.get(id) || [];
      if (!kids.length) { leaves[id] = 1; return 1; }
      let sum = 0;
      kids.forEach((c) => { sum += leafCount(c, childrenMap, leaves); });
      leaves[id] = sum;
      return sum;
    }

    function radialLayout(forest) {
      const { childrenMap, roots } = forest;
      const leaves = {};
      roots.forEach((r) => leafCount(r, childrenMap, leaves));
      const totalLeaves = roots.reduce((sum, r) => sum + (leaves[r] || 1), 0) || 1;
      const cx = 560, cy = 380, step = 132;
      const positions = {};
      const place = (id, a0, a1, depth) => {
        const mid = (a0 + a1) / 2;
        const r = depth * step;
        positions[id] = { x: cx + r * Math.cos(mid), y: cy + r * Math.sin(mid) };
        const kids = childrenMap.get(id) || [];
        if (kids.length) {
          let a = a0;
          kids.forEach((child) => {
            const frac = (leaves[child] || 1) / (leaves[id] || 1);
            const next = a + (a1 - a0) * frac;
            place(child, a, next, depth + 1);
            a = next;
          });
        }
      };
      let a0 = -Math.PI / 2;
      const sweep = Math.PI * 2;
      roots.forEach((root) => {
        const frac = (leaves[root] || 1) / totalLeaves;
        const a1 = a0 + sweep * frac;
        place(root, a0, a1, roots.length > 1 ? 0.7 : 0);
        a0 = a1;
      });
      return { positions, world: { w: 1120, h: 760 } };
    }

    function treeLayout(forest) {
      const { childrenMap, roots } = forest;
      const positions = {};
      let leafIdx = 0;
      const rowH = 118, colW = 120;
      const walk = (id, depth) => {
        const kids = childrenMap.get(id) || [];
        let x;
        if (!kids.length) { x = leafIdx++; }
        else {
          const xs = kids.map((c) => walk(c, depth + 1));
          x = (xs[0] + xs[xs.length - 1]) / 2;
        }
        positions[id] = { gx: x, y: 60 + depth * rowH };
        return x;
      };
      roots.forEach((r) => walk(r, 0));
      const total = Math.max(leafIdx, 1);
      const width = Math.max(total * colW, 720);
      Object.values(positions).forEach((p) => { p.x = 60 + (p.gx + 0.5) * (width / total); });
      const maxDepth = Math.max(0, ...[...forest.depth.values()]);
      return { positions, world: { w: width + 120, h: 60 + (maxDepth + 1) * rowH + 80 } };
    }

    /* ---------- HORIZON DATA ---------- */
    function durationOf(detail) {
      return Math.max(0, detail?.duration_seconds || detail?.run?.duration_seconds || 0);
    }

    function eventsAtHorizon(detail) {
      const visible = detail.events.filter((event) => event.offset_seconds <= playbackTime + 0.0001);
      const result = [];
      const heartbeatIndex = new Map();
      visible.forEach((event) => {
        if (!['worker.heartbeat', 'scheduler.worker_heartbeat', 'lease.heartbeat'].includes(event.kind)) { result.push(event); return; }
        const minute = Math.floor(new Date(event.timestamp).getTime() / 60000);
        const key = `${event.actor?.id || event.span_id}:${minute}`;
        const prior = heartbeatIndex.get(key);
        if (prior === undefined) { heartbeatIndex.set(key, result.length); result.push({ ...event, coalesced_heartbeats: 1 }); }
        else result[prior] = { ...event, coalesced_heartbeats: (result[prior].coalesced_heartbeats || 1) + 1 };
      });
      return result;
    }

    function statusColor(status) {
      return STATUS_COLOR[status] ? cssVar(STATUS_COLOR[status]) : cssVar('--idle');
    }

    function actorStatus(events, hasStall) {
      if (!events.length) return 'idle';
      if (hasStall) return 'stalled';
      const lifecycle = [...events].reverse().find((event) => event.kind.startsWith('agent.') || event.kind.startsWith('trace.'));
      if (lifecycle) {
        if (lifecycle.kind.endsWith('.failed')) return 'error';
        if (lifecycle.kind.endsWith('.completed')) return 'done';
      }
      const last = events[events.length - 1];
      if (last.operation && last.operation.status === 'failed') return 'error';
      const startCount = events.filter((event) => event.kind.endsWith('.started')).length;
      const doneCount = events.filter((event) => event.kind.endsWith('.completed') || event.kind.endsWith('.failed')).length;
      if (startCount > doneCount) return last.operation && last.operation.status === 'waiting' ? 'waiting' : 'running';
      return 'running';
    }

    function usageFor(events) {
      const fields = ['input_tokens', 'output_tokens', 'total_tokens', 'cost_usd'];
      const result = Object.fromEntries(fields.map((field) => [field, { available: false, value: 0 }]));
      events.forEach((event) => fields.forEach((field) => {
        const usage = event.usage[field];
        if (usage && usage.available) {
          result[field].available = true;
          result[field].value += usage.value || 0;
        }
      }));
      return result;
    }

    function usageValue(field) {
      return field && field.available ? compactNumber(field.value || 0) : 'n/a';
    }

    function renderUsageTable(container, rows, key, label) {
      const table = document.createElement('table');
      const heading = document.createElement('thead');
      heading.innerHTML = `<tr><th>${escapeHtml(label)}</th><th>input</th><th>output</th><th>total</th><th>cost</th></tr>`;
      const body = document.createElement('tbody');
      rows.forEach((row) => {
        const tr = document.createElement('tr');
        const usage = row.usage || {};
        [row[key], usageValue(usage.input_tokens), usageValue(usage.output_tokens), usageValue(usage.total_tokens), costValue(usage.cost_usd, 4)].forEach((value) => {
          const td = document.createElement('td');
          td.textContent = value;
          tr.append(td);
        });
        body.append(tr);
      });
      table.append(heading, body);
      container.append(table);
    }

    function costValue(field, precision) {
      return field && field.available ? `$${Number(field.value || 0).toFixed(precision)}` : 'n/a';
    }

    function agentsAtHorizon(detail, visibleEvents) {
      const warnings = warningsAtHorizon(detail, visibleEvents);
      const byId = new Map(detail.actors.map((agent) => [agent.id, agent]));
      const eventsByActor = new Map();
      visibleEvents.forEach((event) => {
        const list = eventsByActor.get(event.actor.id) || [];
        list.push(event);
        eventsByActor.set(event.actor.id, list);
      });
      return [...eventsByActor.keys()].map((actorId) => {
        const agent = byId.get(actorId) || { id: actorId, role: null, model: null, parent_id: null, child_ids: [] };
        const actorEvents = eventsByActor.get(actorId);
        const hasStall = warnings.some((warning) => warning.actor_id === actorId && warning.code === 'STALL' && warning.active !== false);
        const status = actorStatus(actorEvents, hasStall);
        return {
          ...agent,
          status,
          usage: usageFor(actorEvents),
          events: actorEvents,
          firstOffset: actorEvents[0].offset_seconds,
        };
      });
    }

    function matchesQuery(agent, traceId, query) {
      if (!query) return true;
      const eventContent = (agent.events || []).map((event) => [
        event.event_id,
        event.kind,
        event.span_id,
        event.emitter_id,
        event.operation && event.operation.name,
        event.attributes,
        event.payload,
      ].map((value) => typeof value === 'string' ? value : JSON.stringify(value || '')).join(' ')).join(' ');
      const haystack = `${agent.id} ${agent.role || ''} ${agent.model || ''} ${traceId} ${eventContent}`.toLowerCase();
      return haystack.includes(query);
    }

    function descendantSet(actors, rootId) {
      const byId = new Map(actors.map((a) => [a.id, a]));
      const out = new Set([rootId]);
      const walk = (id) => {
        const agent = byId.get(id);
        if (!agent) return;
        (agent.child_ids || []).forEach((child) => { if (!out.has(child)) { out.add(child); walk(child); } });
      };
      walk(rootId);
      return out;
    }

    /* ---------- NODE-LINK (graph / tree) ---------- */
    function renderNodeLink(detail, horizonAgents) {
      const forest = buildForest(detail.actors);
      const layout = selectedView === 'graph' ? radialLayout(forest) : treeLayout(forest);
      const positions = layout.positions;
      const world = layout.world;
      const query = searchEl.value.trim().toLowerCase();
      const focusSet = focusedAgentId ? descendantSet(detail.actors, focusedAgentId) : null;
      const horizonById = new Map(horizonAgents.map((a) => [a.id, a]));
      const visibleEventIds = new Set(eventsAtHorizon(detail).map((event) => event.event_id));

      let visible = detail.actors.filter((agent) => horizonById.has(agent.id) && positions[agent.id]);
      const dense = visible.length > visibleLimit;
      if (dense) {
        const selectedFirst = visible.filter((a) => a.id === selectedAgentId);
        const rest = visible.filter((a) => a.id !== selectedAgentId).slice(0, Math.max(0, visibleLimit - selectedFirst.length));
        visible = [...selectedFirst, ...rest];
      }

      const canvas = document.createElement('div');
      canvas.className = 'view-canvas';
      canvas.style.width = `${world.w}px`;
      canvas.style.height = `${world.h}px`;
      canvas.style.transform = `translate(${viewTransform.x}px, ${viewTransform.y}px) scale(${viewTransform.scale})`;
      canvas.style.transformOrigin = '0 0';

      const svg = document.createElementNS(svgNamespace, 'svg');
      svg.classList.add('edge-layer');
      svg.setAttribute('width', String(world.w));
      svg.setAttribute('height', String(world.h));
      const visibleIds = new Set(visible.map((a) => a.id));
      const links = selectedView === 'graph'
        ? detail.links.filter((link) => link.target_actor_id && visibleEventIds.has(link.event_id))
        : visible.filter((agent) => agent.parent_id).map((agent) => ({ type: 'spawn', source_actor_id: agent.parent_id, target_actor_id: agent.id }));
      links.forEach((link) => {
        const sourceId = link.source_actor_id;
        const targetId = link.target_actor_id;
        if (!visibleIds.has(sourceId) || !visibleIds.has(targetId)) return;
        const p = positions[targetId], pp = positions[sourceId];
        if (!p || !pp) return;
        const childAgent = horizonById.get(targetId);
        const parentAgent = horizonById.get(sourceId);
        const active = childAgent && ['running', 'waiting'].includes(childAgent.status);
        const dim = (focusSet && (!focusSet.has(targetId) || !focusSet.has(sourceId))) || !matchesQuery(childAgent, detail.run.trace_id, query) || !matchesQuery(parentAgent || childAgent, detail.run.trace_id, query);
        const path = document.createElementNS(svgNamespace, 'path');
        let d;
        if (selectedView === 'tree') {
          const my = (p.y + pp.y) / 2;
          d = `M ${pp.x} ${pp.y + 22} C ${pp.x} ${my}, ${p.x} ${my}, ${p.x} ${p.y - 22}`;
        } else {
          d = `M ${pp.x} ${pp.y} L ${p.x} ${p.y}`;
        }
        path.setAttribute('d', d);
        path.setAttribute('stroke', link.type === 'message' ? cssVar('--accent') : (active ? statusColor('running') : cssVar('--line')));
        path.setAttribute('stroke-width', active ? '2' : '1.4');
        path.setAttribute('stroke-dasharray', link.type === 'message' ? '3 4' : (active ? '6 6' : '0'));
        path.dataset.linkType = link.type;
        path.style.opacity = dim ? '0.15' : active ? '0.95' : '0.5';
        if (active) path.style.animation = 'at-dash .6s linear infinite';
        svg.append(path);
      });
      canvas.append(svg);

      visible.forEach((agent) => {
        const p = positions[agent.id];
        const horizonAgent = horizonById.get(agent.id);
        const status = horizonAgent ? horizonAgent.status : 'idle';
        const color = statusColor(status);
        const isOrch = forest.depth.get(agent.id) === 0;
        const size = isOrch ? 58 : 44;
        const active = ['running', 'waiting'].includes(status);
        const selected = agent.id === selectedAgentId;
        const dim = (focusSet && !focusSet.has(agent.id)) || !matchesQuery(horizonAgent, detail.run.trace_id, query);
        const agentWarnings = warningsForActor(detail, agent.id);

        const wrap = document.createElement('button');
        wrap.type = 'button';
        wrap.className = 'node-wrap';
        wrap.style.left = `${p.x}px`;
        wrap.style.top = `${p.y}px`;
        wrap.style.opacity = dim ? '0.22' : '1';
        wrap.style.zIndex = selected ? '5' : '2';

        const dot = document.createElement('div');
        dot.className = 'node-dot';
        dot.style.width = `${size}px`;
        dot.style.height = `${size}px`;
        dot.style.borderRadius = isOrch ? '14px' : '50%';
        dot.style.background = isOrch ? `linear-gradient(135deg, ${cssVar('--orch')}, ${cssVar('--run')})` : cssVar('--panel');
        dot.style.border = `2px solid ${selected ? cssVar('--accent') : color}`;
        dot.style.boxShadow = (selected ? `0 0 0 4px rgba(122,162,255,.25), ` : '') + (active ? `0 0 16px ${color}` : '0 2px 8px rgba(0,0,0,.4)');

        const ring = document.createElement('span');
        ring.className = 'node-ring';
        ring.style.borderRadius = isOrch ? '14px' : '50%';
        ring.style.border = `2px solid ${color}`;
        ring.style.opacity = active ? '0.9' : '0';
        ring.style.animation = active ? 'at-pulse 1.8s ease-out infinite' : 'none';
        ring.style.setProperty('--glow', color);

        const glyph = document.createElement('span');
        glyph.className = 'node-glyph';
        glyph.style.color = isOrch ? '#0a0e17' : color;
        glyph.textContent = isOrch ? '★' : agent.id.split('-').pop().slice(0, 2).toUpperCase();

        dot.append(ring, glyph);

        const labelWrap = document.createElement('div');
        labelWrap.className = 'node-label';
        labelWrap.innerHTML = `<div class="id">${escapeHtml(agent.id)}</div><div class="role">${escapeHtml(text(agent.role))}</div>`;

        wrap.append(dot, labelWrap);
        agentWarnings.forEach((warn, warningIndex) => {
          const badge = document.createElement('span');
          badge.className = 'node-warn';
          badge.textContent = warn.code;
          badge.style.transform = `translateY(${warningIndex * 17}px)`;
          wrap.append(badge);
        });
        wrap.addEventListener('click', (event) => {
          event.stopPropagation();
          selectedAgentId = agent.id;
          selectedEventId = null;
          renderDetail(detail);
        });
        canvas.append(wrap);
      });

      if (selectedView === 'graph') {
        detail.links.filter((link) => link.unresolved_target && visibleEventIds.has(link.event_id) && visibleIds.has(link.source_actor_id)).forEach((link, index) => {
          const source = positions[link.source_actor_id];
          if (!source) return;
          const endpoint = document.createElement('div');
          endpoint.className = 'node-wrap unresolved-node';
          endpoint.style.left = `${source.x + 90}px`;
          endpoint.style.top = `${source.y + 46 + index * 26}px`;
          endpoint.textContent = `unresolved: ${link.unresolved_target}`;
          canvas.append(endpoint);
        });
      }

      const parent = document.createElement('div');
      parent.append(canvas);
      if (dense) {
        const note = document.createElement('button');
        note.type = 'button';
        note.className = 'dense-note';
        note.dataset.action = 'show-more';
        note.textContent = `showing ${visible.length} of ${detail.actors.filter((a) => horizonById.has(a.id)).length} agents`;
        note.addEventListener('click', () => { visibleLimit += 40; renderDetail(currentDetail); });
        parent.append(note);
      }
      stageEl.replaceChildren(parent);
    }

    function warningsForActor(detail, actorId) {
      const visibleIds = new Set(eventsAtHorizon(detail).map((e) => e.event_id));
      return detail.warnings.filter((warning) => warning.actor_id === actorId && (!warning.event_id || visibleIds.has(warning.event_id)) && warning.active !== false);
    }

    /* ---------- SWIMLANE ---------- */
    function pairSpans(actorEvents, horizon) {
      const spans = [];
      const openModel = new Map();
      const openTool = new Map();
      actorEvents.forEach((event) => {
        if (event.kind === 'model.request.started' || event.kind === 'model.request') { openModel.set(event.span_id, event); return; }
        if (event.kind.startsWith('tool.call.started')) { openTool.set(event.span_id, event); return; }
        if (event.kind === 'model.response.completed' || event.kind === 'model.response.failed') {
          const start = openModel.get(event.span_id);
          openModel.delete(event.span_id);
          const startAt = start ? start.offset_seconds : event.offset_seconds - 1.5;
          spans.push({ start: startAt, end: event.offset_seconds, kind: 'model', failed: event.kind.endsWith('.failed') });
          return;
        }
        if (event.kind === 'tool.call.completed' || event.kind === 'tool.call.failed') {
          const start = openTool.get(event.span_id);
          openTool.delete(event.span_id);
          const startAt = start ? start.offset_seconds : event.offset_seconds - 0.6;
          spans.push({ start: startAt, end: event.offset_seconds, kind: 'tool', failed: event.kind.endsWith('.failed') });
        }
      });
      openModel.forEach((start) => spans.push({ start: start.offset_seconds, end: Math.max(start.offset_seconds, horizon), kind: 'model', failed: false }));
      openTool.forEach((start) => spans.push({ start: start.offset_seconds, end: Math.max(start.offset_seconds, horizon), kind: 'tool', failed: false }));
      return spans;
    }

    function renderSwimlane(detail, horizonAgents) {
      const duration = Math.max(durationOf(detail), 1);
      const query = searchEl.value.trim().toLowerCase();
      const focusSet = focusedAgentId ? descendantSet(detail.actors, focusedAgentId) : null;
      const laneAgents = horizonAgents
        .filter((agent) => matchesQuery(agent, detail.run.trace_id, query) && (!focusSet || focusSet.has(agent.id)))
        .sort((a, b) => a.firstOffset - b.firstOffset);

      const inner = document.createElement('div');
      inner.className = 'swimlane-inner';
      inner.style.minWidth = '920px';

      const axis = document.createElement('div');
      axis.className = 'time-axis';
      for (let i = 0; i <= 6; i++) {
        const tick = document.createElement('div');
        tick.className = 'time-tick';
        tick.style.width = `${760 / 6}px`;
        tick.textContent = clock((duration * i) / 6);
        axis.append(tick);
      }
      inner.append(axis);

      const scale = (seconds) => (seconds / duration) * 760;
      laneAgents.forEach((agent) => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'lane-row';
        row.setAttribute('aria-current', agent.id === selectedAgentId ? 'true' : 'false');
        const head = document.createElement('div');
        head.className = 'lane-head';
        head.innerHTML = `<span class="dot" style="background:${statusColor(agent.status)}"></span>
          <div style="min-width:0">
            <div class="id">${escapeHtml(agent.id)}</div>
            <div class="role">${escapeHtml(text(agent.role))}</div>
          </div>`;
        const track = document.createElement('div');
        track.className = 'lane-track';
        pairSpans(agent.events, playbackTime || 0).forEach((span) => {
          const el = document.createElement('div');
          el.className = 'lane-span';
          el.title = `${span.kind} · ${(span.end - span.start).toFixed(1)}s`;
          el.style.left = `${scale(span.start)}px`;
          el.style.width = `${Math.max(4, scale(span.end - span.start))}px`;
          el.style.background = span.kind === 'model' ? cssVar('--run') : (span.failed ? cssVar('--err') : cssVar('--ok'));
          track.append(el);
        });
        row.append(head, track);
        row.addEventListener('click', () => { selectedAgentId = agent.id; selectedEventId = null; renderDetail(detail); });
        inner.append(row);
      });

      const playhead = document.createElement('div');
      playhead.className = 'playhead';
      playhead.style.left = `${150 + scale(playbackTime || 0)}px`;
      inner.append(playhead);

      swimlaneEl.replaceChildren(inner);
    }

    /* ---------- SEQUENCE ---------- */
    function renderSequence(detail, horizonAgents) {
      const query = searchEl.value.trim().toLowerCase();
      const focusSet = focusedAgentId ? descendantSet(detail.actors, focusedAgentId) : null;
      const visibleEvents = eventsAtHorizon(detail);
      const matchingIds = new Set(horizonAgents.filter((agent) => matchesQuery(agent, detail.run.trace_id, query)).map((agent) => agent.id));
      if (query) {
        visibleEvents.filter((event) => event.kind === 'message.sent' && matchingIds.has(event.actor.id)).forEach((event) => {
          matchingIds.add(event.actor.id);
          if (event.attributes && typeof event.attributes.to === 'string') matchingIds.add(event.attributes.to);
        });
      }
      const seqAgents = horizonAgents
        .filter((agent) => matchingIds.has(agent.id) && (!focusSet || focusSet.has(agent.id)))
        .sort((a, b) => a.firstOffset - b.firstOffset);
      const colX = {};
      seqAgents.forEach((agent, i) => { colX[agent.id] = i * 150 + 70; });
      const duration = Math.max(durationOf(detail), 0.0001);

      const messages = visibleEvents.filter((event) => event.kind === 'message.sent' && event.attributes && typeof event.attributes.to === 'string' && colX[event.actor.id] != null && colX[event.attributes.to] != null);
      const rowHeight = Math.max(400, messages.length * 36);

      const inner = document.createElement('div');
      inner.className = 'sequence-inner';
      inner.style.minHeight = `${rowHeight + 64}px`;

      seqAgents.forEach((agent) => {
        const head = document.createElement('div');
        head.className = 'seq-col-head';
        head.style.left = `${colX[agent.id]}px`;
        head.innerHTML = `<span class="dot" style="background:${statusColor(agent.status)}"></span><span class="id">${escapeHtml(agent.id)}</span>`;
        inner.append(head);
      });
      seqAgents.forEach((agent) => {
        const line = document.createElement('div');
        line.className = 'seq-line';
        line.style.left = `${20 + colX[agent.id]}px`;
        inner.append(line);
      });

      const svg = document.createElementNS(svgNamespace, 'svg');
      svg.style.position = 'absolute';
      svg.style.top = '34px';
      svg.style.left = '20px';
      svg.style.overflow = 'visible';
      svg.style.pointerEvents = 'none';
      svg.setAttribute('width', '1');
      svg.setAttribute('height', '1');
      messages.forEach((event) => {
        const y = 20 + (event.offset_seconds / duration) * rowHeight;
        const x1 = colX[event.actor.id], x2raw = colX[event.attributes.to];
        const dir = x2raw > x1 ? 1 : -1;
        const x2 = x2raw - dir * 6;
        const line = document.createElementNS(svgNamespace, 'line');
        line.setAttribute('x1', String(x1));
        line.setAttribute('y1', String(y));
        line.setAttribute('x2', String(x2));
        line.setAttribute('y2', String(y));
        line.setAttribute('stroke', cssVar('--accent'));
        line.setAttribute('stroke-width', '1.5');
        svg.append(line);
        const polygon = document.createElementNS(svgNamespace, 'polygon');
        polygon.setAttribute('points', `${x2},${y} ${x2 - dir * 6},${y - 4} ${x2 - dir * 6},${y + 4}`);
        polygon.setAttribute('fill', cssVar('--accent'));
        svg.append(polygon);
        const label = document.createElement('div');
        label.className = 'seq-arrow-label';
        label.style.left = `${20 + Math.min(x1, x2raw) + 8}px`;
        label.style.top = `${34 + y - 16}px`;
        label.textContent = `delegate → ${event.attributes.to}`;
        inner.append(label);
      });
      inner.append(svg);

      if (!messages.length) {
        const empty = document.createElement('div');
        empty.className = 'seq-empty';
        empty.style.position = 'absolute';
        empty.style.top = '40px';
        empty.style.left = '20px';
        empty.textContent = 'No message.sent hand-offs at this playback time.';
        inner.append(empty);
      }

      sequenceEl.replaceChildren(inner);
    }

    /* ---------- FIT VIEW ---------- */
    function fitView() {
      if (!['graph', 'tree'].includes(selectedView) || !currentDetail) { viewTransform = { scale: 1, x: 0, y: 0 }; return; }
      const forest = buildForest(currentDetail.actors);
      const layout = selectedView === 'graph' ? radialLayout(forest) : treeLayout(forest);
      const pts = Object.values(layout.positions);
      if (!pts.length) return;
      const xs = pts.map((p) => p.x), ys = pts.map((p) => p.y);
      const minX = Math.min(...xs) - 80, maxX = Math.max(...xs) + 80;
      const minY = Math.min(...ys) - 70, maxY = Math.max(...ys) + 80;
      const bw = Math.max(1, maxX - minX), bh = Math.max(1, maxY - minY);
      const rect = stageEl.getBoundingClientRect();
      if (!rect.width) return;
      const z = Math.max(0.42, Math.min(1.5, Math.min(rect.width / bw, rect.height / bh) * 0.92));
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      viewTransform = { scale: z, x: rect.width / 2 - cx * z, y: rect.height / 2 - cy * z };
      zoomLabelEl.textContent = `${Math.round(z * 100)}%`;
    }

    /* ---------- INSPECTOR ---------- */
    function renderInspector(detail, horizonAgents, warnings) {
      zoomLabelEl.textContent = `${Math.round(viewTransform.scale * 100)}%`;
      const horizonById = new Map(horizonAgents.map((a) => [a.id, a]));
      const event = selectedEventId ? detail.events.find((e) => e.event_id === selectedEventId) : null;
      const agent = !event && selectedAgentId ? (horizonById.get(selectedAgentId) || detail.actors.find((a) => a.id === selectedAgentId)) : null;

      if (event) { renderEventDetail(detail, event); return; }
      if (agent) { renderAgentDetail(detail, agent, horizonById, warnings); return; }
      renderOverview(detail, horizonAgents);
    }

    function renderAgentDetail(detail, agent, horizonById, warnings) {
      const status = agent.status || 'idle';
      const color = statusColor(status);
      const isOrch = !agent.parent_id;
      const glyph = isOrch ? '★' : agent.id.split('-').pop().slice(0, 2).toUpperCase();
      const usage = agent.usage || usageFor(agent.events || []);
      const agentWarnings = warnings.filter((w) => w.actor_id === agent.id);
      const events = (agent.events || []).slice().reverse();

      const wrap = document.createElement('div');

      const header = document.createElement('div');
      header.className = 'inspector-header';
      header.innerHTML = `
        <div class="row">
          <div class="inspector-avatar" style="width:40px;height:40px;border-radius:${isOrch ? '11px' : '50%'};background:${isOrch ? `linear-gradient(135deg, ${cssVar('--orch')}, ${cssVar('--run')})` : cssVar('--panel2')};border:2px solid ${color};color:${isOrch ? '#0a0e17' : color}">${escapeHtml(glyph)}</div>
          <div class="inspector-title-block">
            <strong>${escapeHtml(agent.id)}</strong>
            <span>${escapeHtml(text(agent.role))} · ${escapeHtml(text(agent.model))}</span>
          </div>
          <span class="status-pill" style="color:${color};background:color-mix(in srgb, ${color} 15%, transparent);border-color:${color}">${escapeHtml(status)}</span>
        </div>
        <div class="inspector-actions">
          <button type="button" class="focus-btn" data-action="focus">◎ Focus subtree</button>
          <button type="button" class="close-btn">✕</button>
        </div>`;
      header.querySelector('.focus-btn').addEventListener('click', () => { focusedAgentId = agent.id; renderDetail(detail); });
      header.querySelector('.close-btn').addEventListener('click', () => { selectedAgentId = null; selectedEventId = null; renderDetail(detail); });

      const usageBlock = document.createElement('div');
      usageBlock.className = 'inspector-block';
      const spark = buildSparkline(agent.events || []);
      usageBlock.innerHTML = `
        <div class="inspector-label">USAGE</div>
        <div class="usage-grid">
          <div class="usage-card"><div class="k">INPUT TOK</div><div class="v" style="color:${cssVar('--run')}">${usageValue(usage.input_tokens)}</div></div>
          <div class="usage-card"><div class="k">OUTPUT TOK</div><div class="v" style="color:${cssVar('--ok')}">${usageValue(usage.output_tokens)}</div></div>
          <div class="usage-card"><div class="k">COST</div><div class="v" style="color:${cssVar('--warn')}">${costValue(usage.cost_usd, 3)}</div></div>
        </div>
        <div class="spark-label">TOKENS OVER TIME</div>
        <div class="spark-row"></div>`;
      const sparkRow = usageBlock.querySelector('.spark-row');
      const maxSpark = Math.max(1, ...spark);
      spark.forEach((value) => {
        const bar = document.createElement('div');
        bar.className = 'spark-bar';
        bar.title = `${compactNumber(value)} tok`;
        bar.style.height = `${Math.max(3, (value / maxSpark) * 44)}px`;
        bar.style.background = value ? cssVar('--run') : cssVar('--line');
        bar.style.opacity = value ? '0.85' : '0.4';
        sparkRow.append(bar);
      });

      const orchBlock = document.createElement('div');
      orchBlock.className = 'inspector-block';
      const parentRow = document.createElement('div');
      parentRow.className = 'orch-row';
      if (agent.parent_id) {
        parentRow.innerHTML = `<span class="tag">parent</span>`;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip-btn parent';
        btn.textContent = `↑ ${agent.parent_id}`;
        btn.addEventListener('click', () => { selectedAgentId = agent.parent_id; selectedEventId = null; renderDetail(detail); });
        parentRow.append(btn);
      } else {
        parentRow.innerHTML = `<span class="tag">parent</span><span class="root-label">root orchestrator</span>`;
      }
      const childrenRow = document.createElement('div');
      childrenRow.className = 'orch-row children';
      const childrenWrap = document.createElement('div');
      childrenWrap.className = 'children-wrap';
      const children = (agent.child_ids || []).filter((id) => horizonById.has(id));
      if (children.length) {
        children.forEach((childId) => {
          const childAgent = horizonById.get(childId);
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'chip-btn child';
          btn.innerHTML = `<span class="dot" style="background:${statusColor(childAgent ? childAgent.status : 'idle')}"></span>${escapeHtml(childId)}`;
          btn.addEventListener('click', () => { selectedAgentId = childId; selectedEventId = null; renderDetail(detail); });
          childrenWrap.append(btn);
        });
      } else {
        childrenWrap.innerHTML = `<span class="leaf-label">— leaf agent —</span>`;
      }
      childrenRow.innerHTML = `<span class="tag">children</span>`;
      childrenRow.append(childrenWrap);
      orchBlock.innerHTML = `<div class="inspector-label">ORCHESTRATION</div>`;
      orchBlock.append(parentRow, childrenRow);

      let warnBlock = null;
      if (agentWarnings.length) {
        warnBlock = document.createElement('div');
        warnBlock.className = 'inspector-block';
        warnBlock.innerHTML = `<div class="warn-title">⚠ WARNINGS</div>`;
        agentWarnings.forEach((warning) => {
          const card = document.createElement('div');
          card.className = 'agent-warn-card';
          card.innerHTML = `
            <div class="head"><span class="code">${escapeHtml(warning.code)}</span><span class="heuristic">heuristic</span></div>
            <div class="summary">${escapeHtml(warning.summary)}</div>`;
          warnBlock.append(card);
        });
      }

      const timelineBlock = document.createElement('div');
      timelineBlock.className = 'inspector-block';
      timelineBlock.innerHTML = `<div class="timeline-head"><div class="inspector-label" style="margin-bottom:0">EVENT TIMELINE</div><div class="timeline-count">${events.length} events</div></div>`;
      events.forEach((eventItem) => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'event-row';
        const failed = eventItem.operation && eventItem.operation.status === 'failed';
        const isModel = eventItem.kind.startsWith('model.');
        const railColor = failed ? cssVar('--err') : (isModel ? cssVar('--run') : cssVar('--ok'));
        const kindShort = eventItem.kind.replace('.started', '').replace('.completed', '').replace('.failed', '');
        const outTok = eventItem.usage && eventItem.usage.output_tokens && eventItem.usage.output_tokens.available ? `${compactNumber(eventItem.usage.output_tokens.value)} out tok` : null;
