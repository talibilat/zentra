        const dur = eventItem.operation && eventItem.operation.duration_ms ? `${eventItem.operation.duration_ms}ms` : null;
        const meta = `${clock(eventItem.offset_seconds)} · ${outTok || dur || eventItem.span_id}`;
        row.innerHTML = `
          <div class="event-rail" style="background:${railColor}"></div>
          <div class="event-main">
            <div class="head"><span class="event-kind-chip">${escapeHtml(kindShort)}</span><span class="event-name">${escapeHtml(text(eventItem.operation && eventItem.operation.name))}</span></div>
            <div class="event-meta">${escapeHtml(meta)}</div>
          </div>
          <span class="event-status-dot" style="background:${failed ? cssVar('--err') : (eventItem.kind.endsWith('.started') ? cssVar('--run') : cssVar('--ok'))}"></span>`;
        row.addEventListener('click', () => { selectedEventId = eventItem.event_id; renderDetail(detail); });
        timelineBlock.append(row);
      });

      wrap.append(header, usageBlock, orchBlock);
      if (warnBlock) wrap.append(warnBlock);
      wrap.append(timelineBlock);
      inspectorEl.replaceChildren(wrap);
    }

    function buildSparkline(agentEvents) {
      const bins = 12;
      const spark = Array.from({ length: bins }, () => 0);
      if (!agentEvents.length) return spark;
      const start = agentEvents[0].offset_seconds;
      const end = Math.max(start + 1, agentEvents[agentEvents.length - 1].offset_seconds);
      agentEvents.forEach((event) => {
        const total = (event.usage.input_tokens.value || 0) + (event.usage.output_tokens.value || 0);
        if (!total) return;
        const bin = Math.min(bins - 1, Math.max(0, Math.floor(((event.offset_seconds - start) / (end - start)) * bins)));
        spark[bin] += total;
      });
      return spark;
    }

    function renderEventDetail(detail, event) {
      const status = event.operation ? event.operation.status : null;
      const statusForColor = status === 'failed' ? 'error' : status === 'completed' ? 'done' : 'running';
      const fields = [
        ['trace_id', event.trace_id],
        ['span_id', event.span_id],
        ['parent_span', event.parent_span_id || '—'],
        ['emitter', event.emitter_id],
        ['sequence', event.sequence],
        ['actor', event.actor.id],
        ['status', status || '—'],
        ['operation', event.operation && event.operation.name || '—'],
        ['uncertain', event.uncertain ? 'yes' : 'no'],
        ['timestamp', event.timestamp],
      ];
      const usage = event.usage || {};
      const hasUsage = ['input_tokens', 'output_tokens', 'total_tokens', 'cost_usd'].some((field) => usage[field] && usage[field].available);
      const attributes = event.attributes || {};
      const payload = event.payload;
      const isStart = event.kind.endsWith('.started') || event.kind === 'model.request';
      const isEnd = event.kind.endsWith('.completed') || event.kind.endsWith('.failed');
      const hasPayloadPreview = !!(payload && payload.preview !== undefined);
      const payloadOmitted = !!(payload && payload.state === 'omitted');
      let input = null;
      let inputFromPayload = false;
      if (isStart) {
        if (attributes.arguments) input = JSON.stringify(attributes.arguments, null, 2);
        else if (attributes.instruction) input = attributes.instruction;
        else if (hasPayloadPreview) { input = typeof payload.preview === 'string' ? payload.preview : JSON.stringify(payload.preview, null, 2); inputFromPayload = true; }
      }
      let output = null;
      if (isEnd && hasPayloadPreview) {
        output = typeof payload.preview === 'string' ? payload.preview : JSON.stringify(payload.preview, null, 2);
      }
      const meta = payload && payload.metadata;
      const payloadBlockIsOutput = isEnd && hasPayloadPreview;
      const payloadBlockIsInput = !payloadBlockIsOutput && inputFromPayload;

      const wrap = document.createElement('div');
      const head = document.createElement('div');
      head.className = 'event-detail-head';
      head.innerHTML = `
        <button type="button" class="back-btn">←</button>
        <div class="titles"><strong>Event Inspector</strong><span>${escapeHtml(event.event_id)}</span></div>
        <span class="kind-chip">${escapeHtml(event.kind)}</span>`;
      head.querySelector('.back-btn').addEventListener('click', () => { selectedEventId = null; renderDetail(detail); });

      const fieldsBlock = document.createElement('div');
      fieldsBlock.className = 'inspector-block';
      const grid = document.createElement('div');
      grid.className = 'field-grid';
      fields.forEach(([k, v]) => {
        const kEl = document.createElement('div'); kEl.className = 'k'; kEl.textContent = k;
        const vEl = document.createElement('div'); vEl.className = 'v'; vEl.textContent = text(v);
        vEl.style.color = k === 'status' ? statusColor(statusForColor) : cssVar('--text');
        grid.append(kEl, vEl);
      });
      fieldsBlock.append(grid);

      wrap.append(head, fieldsBlock);

      const security = detail.security || {};
      const securityFinding = (security.findings || []).find(
        (finding) => finding.operation_event_id === event.event_id
      );
      const securityPath = securityFinding
        ? (security.paths || []).find((path) => path.id === securityFinding.path_id)
        : null;
      const securityDiagnostics = (security.integrity || []).filter(
        (item) => item.event_id === event.event_id
          || item.source_event_id === event.event_id
          || item.operation_event_id === event.event_id
      );
      if (securityFinding || securityDiagnostics.length) {
        const block = document.createElement('div');
        block.className = 'inspector-block security-audit';
        block.innerHTML = `<div class="inspector-label">SECURITY AUDIT · AUDIT ONLY</div>`;
        if (securityFinding) {
          const title = document.createElement('div');
          title.className = 'warn-title';
          title.textContent = securityFinding.code;
          const capabilities = document.createElement('div');
          capabilities.className = 'detail';
          capabilities.textContent = `capabilities ${(securityFinding.capabilities || []).join(', ')}`;
          block.append(title, capabilities);
        }
        if (securityPath) {
          const trust = document.createElement('div');
          trust.className = 'detail';
          trust.textContent = `trust evidence ${(securityPath.trust_origins || []).map(
            (item) => `${item.event_id}=${item.trust_origin} (${item.risk})`
          ).join(', ') || 'none'}`;
          const path = document.createElement('div');
          path.className = 'detail security-path';
          path.textContent = `influence path ${(securityPath.events || []).map(
            (item) => `${item.event_id} [${(item.trust_origins || []).join(', ') || 'unlabeled'}]`
          ).join(' → ')}`;
          block.append(trust, path);
        }
        securityDiagnostics.forEach((diagnostic) => {
          const item = document.createElement('div');
          item.className = 'diagnostic';
          item.textContent = `${diagnostic.code} · ${diagnostic.target_event_id || diagnostic.event_id || 'unknown event'}`;
          block.append(item);
        });
        wrap.append(block);
      }

      const eventWarnings = (detail.warnings || []).filter((warning) => warning.event_id === event.event_id);
      if (eventWarnings.length) {
        const warningBlock = document.createElement('div');
        warningBlock.className = 'inspector-block event-warnings';
        warningBlock.innerHTML = `<div class="warn-title">WARNINGS</div>`;
        eventWarnings.forEach((warning) => {
          const card = document.createElement('div');
          card.className = 'agent-warn-card';
          card.innerHTML = `
            <div class="head"><span class="code">${escapeHtml(warning.code)}</span><span class="heuristic">${warning.active === false ? 'resolved' : 'active'}</span></div>
            <div class="summary">${escapeHtml(warning.summary)}</div>
            <div class="detail">${escapeHtml(text(warning.evidence))}</div>`;
          warningBlock.append(card);
        });
        wrap.append(warningBlock);
      }

      const evidenceMap = detail.evidence_map || {};
      const changeEvidence = (evidenceMap.changes || []).find((change) => change.event_id === event.event_id);
      const invalidChange = (evidenceMap.invalid_changes || []).find(
        (change) => change.event_id === event.event_id
      );
      const sourceDiagnostics = (evidenceMap.unresolved || []).filter(
        (link) => link.source_event_id === event.event_id
      );
      if (!changeEvidence && sourceDiagnostics.length) {
        const block = document.createElement('div');
        block.className = 'inspector-block relationship-diagnostics';
        block.innerHTML = `<div class="inspector-label">RELATIONSHIP DIAGNOSTICS</div>`;
        sourceDiagnostics.forEach((link) => {
          const card = document.createElement('div');
          card.className = 'unresolved-evidence';
          const type = document.createElement('div');
          type.className = 'type';
          type.textContent = link.reason === 'invalid_correction_detail'
            ? `Invalid correction details · ${link.type}`
            : link.reason === 'correction_chronology_undetermined'
              ? `Correction chronology undetermined · ${link.type}`
            : link.reason === 'verification_chronology_undetermined'
              ? `Verification chronology undetermined · ${link.type}`
            : link.reason === 'proposal_chronology_undetermined'
              ? `Proposal chronology undetermined · ${link.type}`
            : link.reason === 'requirement_chronology_undetermined'
              ? `Requirement chronology undetermined · ${link.type}`
            : link.reason === 'context_chronology_undetermined'
              ? `Context chronology undetermined · ${link.type}`
            : link.reason === 'compaction_chronology_undetermined'
              ? `Compaction chronology undetermined · ${link.type}`
            : link.reason === 'tool_chronology_undetermined'
              ? `Tool chronology undetermined · ${link.type}`
            : link.target_kind
              ? `Invalid relationship target · ${link.type}`
              : `Missing relationship target · ${link.type}`;
          const eventId = document.createElement('div');
          eventId.className = 'event-id';
          const eventDetails = link.target_kind
            ? `${link.target_event_id} · ${link.target_kind}`
            : link.target_event_id;
          eventId.textContent = link.decision_event_id
            ? `${eventDetails} · decision event ${link.decision_event_id}`
            : eventDetails;
          card.append(type, eventId);
          block.append(card);
        });
        wrap.append(block);
      }
      if (invalidChange) {
        const block = document.createElement('div');
        block.className = 'inspector-block invalid-change';
        block.innerHTML = `<div class="inspector-label">CHANGE INTEGRITY</div>`;
        const actor = document.createElement('div');
        actor.className = 'meta';
        actor.textContent = typeof invalidChange.actor_id === 'string' && invalidChange.actor_id.trim()
          ? `event ${invalidChange.event_id} · applied by ${invalidChange.actor_id}`
          : `event ${invalidChange.event_id} · applying actor unknown`;
        block.append(actor);
        const labels = {
          invalid_change_detail: 'Invalid change details',
          invalid_change_path: 'Invalid change path',
          invalid_change_old_start: 'Invalid change old start',
          invalid_change_old_count: 'Invalid change old count',
          invalid_change_new_start: 'Invalid change new start',
          invalid_change_new_count: 'Invalid change new count',
        };
        (invalidChange.integrity || []).forEach((issue) => {
          const warning = document.createElement('div');
          warning.className = 'issue';
          warning.textContent = labels[issue.reason] || `Invalid change metadata · ${issue.field}`;
          block.append(warning);
        });
        wrap.append(block);
      }
      if (changeEvidence) {
        const block = document.createElement('div');
        block.className = 'inspector-block change-evidence';
        block.innerHTML = `<div class="inspector-label">CHANGE EVIDENCE</div>`;
        const formatContextLocator = (context) => {
          if (context.line_start !== undefined) {
            const end = context.line_end === undefined ? '' : `-${context.line_end}`;
            return `${context.path}:${context.line_start}${end}`;
          }
          return context.line_end === undefined
            ? context.path
            : `${context.path}:?-${context.line_end}`;
        };

        const hunk = changeEvidence.hunk;
        const locator = document.createElement('div');
        locator.className = 'hunk';
        locator.textContent = hunk.new_count === 0
          ? `${hunk.path}:${hunk.new_start} (0 lines)`
          : `${hunk.path}:${hunk.new_start}-${hunk.new_start + hunk.new_count - 1}`;
        const diffRange = document.createElement('div');
        diffRange.className = 'actor';
        diffRange.textContent = `@@ -${hunk.old_start},${hunk.old_count} +${hunk.new_start},${hunk.new_count} @@`;
        block.append(locator, diffRange);
        if (hunk.symbol) {
          const symbol = document.createElement('div');
          symbol.className = 'actor';
          symbol.textContent = `symbol ${hunk.symbol}`;
          block.append(symbol);
        }
        (changeEvidence.integrity || []).forEach((issue) => {
          const warning = document.createElement('div');
          warning.className = 'hunk-integrity incomplete';
          warning.textContent = issue.reason === 'invalid_change_symbol'
            ? 'Invalid change symbol'
            : `Invalid change metadata · ${issue.field}`;
          block.append(warning);
        });
        const actor = document.createElement('div');
        actor.className = 'actor';
        actor.textContent = typeof changeEvidence.actor_id === 'string' && changeEvidence.actor_id.trim()
          ? `applied by ${changeEvidence.actor_id}`
          : 'applying actor unknown';
        const eventId = document.createElement('div');
        eventId.className = 'actor';
        eventId.textContent = `event ${changeEvidence.event_id}`;
        block.append(actor, eventId);
        const hunkAttribution = (detail.outcome_cost?.by_hunk || []).find(
          (row) => row.change_event_id === changeEvidence.event_id
        );
        const outcomeCost = document.createElement('div');
        outcomeCost.className = 'outcome-cost';
        const outcome = document.createElement('div');
        outcome.className = 'notice';
        outcome.textContent = `observed outcome ${hunkAttribution?.observed_outcome || 'undetermined'}`;
        outcomeCost.append(outcome);
        renderUsageTable(outcomeCost, [{
          target: changeEvidence.event_id,
          usage: hunkAttribution?.usage || {},
        }], 'target', 'attributed hunk');
        block.append(outcomeCost);

        const hunkWarningCodes = new Set(['UNCOVERED_CHANGE', 'STALE_CONTEXT', 'SELF_CONFIRMING_TEST']);
        (detail.warnings || []).filter(
          (warning) => warning.event_id === changeEvidence.event_id
            && hunkWarningCodes.has(warning.code)
        ).forEach((warning) => {
          const card = document.createElement('div');
          card.className = `agent-warn-card${warning.active === false ? ' resolved' : ''}`;
          const evidence = warning.evidence || '{}';
          card.innerHTML = `
            <div class="head"><span class="code">${escapeHtml(warning.code)}</span><span class="heuristic">${warning.active === false ? 'resolved' : 'deterministic'}</span></div>
            <div class="summary">${escapeHtml(warning.summary)}</div>
            <div class="actor">evidence ${escapeHtml(evidence)}</div>`;
          block.append(card);
        });

        (changeEvidence.links || []).filter(
          (link) => link.type === 'applies'
            && link.target_kind === 'change.proposed'
        ).forEach((link) => {
          const card = document.createElement('div');
          card.className = 'proposal-card';
          const title = document.createElement('div');
          title.className = 'title';
          title.textContent = 'Change proposed';
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = typeof link.target_actor_id === 'string' && link.target_actor_id.trim()
            ? `proposed by ${link.target_actor_id}`
            : 'proposing actor unknown';
          const eventId = document.createElement('div');
          eventId.className = 'meta';
          eventId.textContent = `event ${link.target_event_id}`;
          card.append(title, meta, eventId);
          if (link.chronology === 'undetermined') {
            const chronology = document.createElement('div');
            chronology.className = 'meta';
            chronology.textContent = 'proposal chronology undetermined';
            card.append(chronology);
          }
          block.append(card);
        });

        (changeEvidence.links || []).filter(
          (link) => link.type === 'motivated_by'
            && link.target_kind === 'requirement.observed'
            && link.requirement
        ).forEach((link) => {
          const card = document.createElement('div');
          card.className = 'requirement-card';
          const requirementId = document.createElement('div');
          requirementId.className = 'id';
          requirementId.textContent = `Requirement ${link.requirement.id} · event ${link.target_event_id}`;
          const observer = document.createElement('div');
          observer.className = 'meta';
          const observerDetails = [typeof link.target_actor_id === 'string' && link.target_actor_id.trim()
            ? `observed by ${link.target_actor_id}`
            : 'observing actor unknown'];
          if (link.decision_event_id) observerDetails.push(`decision event ${link.decision_event_id}`);
          if (link.chronology === 'undetermined') {
            observerDetails.push('requirement chronology undetermined');
          }
          observer.textContent = observerDetails.join(' · ');
          const requirementText = document.createElement('div');
          requirementText.className = 'text';
          requirementText.textContent = link.requirement.text;
          card.append(requirementId, observer, requirementText);
          block.append(card);
        });

        (changeEvidence.links || []).filter(
          (link) => link.type === 'informed_by'
            && link.target_kind === 'context.read'
            && link.context
        ).forEach((link) => {
          const card = document.createElement('div');
          card.className = 'context-card';
          const path = document.createElement('div');
          path.className = 'path';
          path.textContent = formatContextLocator(link.context);
          const hasReadingActor = typeof link.target_actor_id === 'string'
            && link.target_actor_id.trim();
          const details = [`event ${link.target_event_id}`];
          details.push(hasReadingActor
            ? `read by ${link.target_actor_id}`
            : 'reading actor unknown');
          if (link.context.symbol) details.push(link.context.symbol);
          if (link.decision_event_id) details.push(`decision event ${link.decision_event_id}`);
          if (link.chronology === 'undetermined') details.push('context chronology undetermined');
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = details.join(' · ');
          card.append(path, meta);
          block.append(card);
        });

        (changeEvidence.links || []).filter(
          (link) => link.type === 'informed_by'
            && link.target_kind === 'context.compacted'
            && link.compaction
        ).forEach((link) => {
          const card = document.createElement('div');
          card.className = 'compaction-card';
          const title = document.createElement('div');
          title.className = 'title';
          const compactionOccurredAfterChange = (changeEvidence.unresolved || []).some(
            (item) => item.reason === 'compaction_not_preceding_change'
              && item.target_event_id === link.target_event_id
          );
          const compactionOccurredAfterDecision = (changeEvidence.unresolved || []).some(
            (item) => item.reason === 'compaction_follows_decision'
              && item.target_event_id === link.target_event_id
          );
          const hasValidDecision = (changeEvidence.links || []).some(
            (item) => item.type === 'applies'
              && item.target_kind === 'change.proposed'
              && typeof item.target_actor_id === 'string'
              && item.target_actor_id.trim()
              && !(changeEvidence.unresolved || []).some(
                (diagnostic) => diagnostic.target_event_id === item.target_event_id
                  && [
                    'proposal_not_preceding_change',
                    'invalid_decision_actor',
                    'proposal_chronology_undetermined',
                  ].includes(diagnostic.reason)
              )
          );
          title.textContent = compactionOccurredAfterChange
            ? 'Context compacted after change'
            : compactionOccurredAfterDecision
              ? 'Context compacted after decision'
              : link.chronology === 'undetermined'
                ? 'Compaction chronology undetermined'
              : hasValidDecision
                ? 'Context compacted before decision'
                : 'Context compacted before change';
          const meta = document.createElement('div');
          meta.className = 'meta';
          const compactionDetails = [`event ${link.target_event_id}`];
          compactionDetails.push(
            typeof link.target_actor_id === 'string' && link.target_actor_id.trim()
              ? `compacted by ${link.target_actor_id}`
              : 'compacting actor unknown'
          );
          if (link.decision_event_id) {
            compactionDetails.push(`decision event ${link.decision_event_id}`);
          }
          meta.textContent = compactionDetails.join(' · ');
          card.append(title, meta);
          (link.compaction.sources || []).filter(
            (source) => source.type === 'summarizes'
          ).forEach((source) => {
            const sourceNode = document.createElement('div');
            sourceNode.className = 'source';
            if (source.context) {
              sourceNode.textContent = formatContextLocator(source.context);
            } else {
              sourceNode.textContent = source.kind;
            }
            const sourceMeta = document.createElement('div');
            sourceMeta.className = 'meta';
            const sourceDetails = [`event ${source.event_id}`];
            sourceDetails.push(typeof source.actor_id === 'string' && source.actor_id.trim()
              ? `source from ${source.actor_id}`
              : 'source actor unknown');
            if (source.context?.symbol) sourceDetails.push(source.context.symbol);
            if (source.chronology === 'undetermined') {
              sourceDetails.push('source chronology undetermined');
            }
            sourceMeta.textContent = sourceDetails.join(' · ');
            card.append(sourceNode, sourceMeta);
          });
          const unresolvedSources = (link.compaction.unresolved || []).filter(
            (source) => source.type === 'summarizes'
          );
          unresolvedSources.forEach((source) => {
            const incomplete = document.createElement('div');
            incomplete.className = 'incomplete';
            incomplete.textContent = source.reason === 'invalid_context_detail'
              ? `Invalid ${source.type} source details · ${source.event_id} · ${source.target_kind}`
              : source.reason === 'context_not_preceding_compaction'
                ? `Context read after compaction · ${source.event_id} · ${source.target_kind}`
              : source.reason === 'context_source_chronology_undetermined'
                ? `Context source chronology undetermined · ${source.event_id} · ${source.target_kind}`
              : source.reason === 'invalid_context_line_start'
                ? `Invalid ${source.type} source line start · ${source.event_id} · ${source.target_kind}`
              : source.reason === 'invalid_context_line_end'
                ? `Invalid ${source.type} source line end · ${source.event_id} · ${source.target_kind}`
              : source.reason === 'invalid_context_symbol'
                ? `Invalid ${source.type} source symbol · ${source.event_id} · ${source.target_kind}`
              : source.target_kind
              ? `Invalid ${source.type} source target · ${source.event_id} · ${source.target_kind}`
              : `Missing ${source.type} source · ${source.event_id}`;
            card.append(incomplete);
          });
          const missingCount = unresolvedSources.length;
          if (missingCount) {
            const incomplete = document.createElement('div');
            incomplete.className = 'incomplete';
            incomplete.textContent = `${missingCount} compacted source${missingCount === 1 ? '' : 's'} unresolved`;
            card.append(incomplete);
          }
          block.append(card);
        });

        (changeEvidence.links || []).filter(
          (link) => link.type === 'preceded_by' && link.tool
        ).forEach((link) => {
          const tool = link.tool;
          const card = document.createElement('div');
          card.className = 'tool-card';
          const operation = document.createElement('div');
          operation.className = 'operation';
          operation.textContent = tool.name ? `Tool · ${tool.name}` : 'Tool';
          card.append(operation);
          if (tool.command) {
            const command = document.createElement('div');
            command.className = 'command';
            command.textContent = `$ ${tool.command}`;
            card.append(command);
          }
          if (tool.result) {
            const result = document.createElement('div');
            result.className = 'result';
            result.textContent = tool.result;
            card.append(result);
          }
          const meta = document.createElement('div');
          meta.className = 'meta';
          const metaParts = [`event ${link.target_event_id}`];
          metaParts.push(typeof link.target_actor_id === 'string' && link.target_actor_id.trim()
            ? `run by ${link.target_actor_id}`
            : 'running actor unknown');
          if (tool.status) metaParts.push(tool.status);
          if (tool.exit_code !== undefined) metaParts.push(`exit ${tool.exit_code}`);
          if (link.decision_event_id) metaParts.push(`decision event ${link.decision_event_id}`);
          if (link.chronology === 'undetermined') metaParts.push('tool chronology undetermined');
          meta.textContent = metaParts.join(' · ');
          card.append(meta);
          block.append(card);
        });

        (changeEvidence.links || []).filter(
          (link) => link.type === 'verified_by' && link.verification
        ).forEach((link) => {
          const verification = link.verification;
          const sameAgent = verification.test_origin === 'same_agent';
          const unknownOrigin = !verification.test_origin;
          const card = document.createElement('div');
          card.className = `verification-card${verification.passed ? '' : ' failed'}${sameAgent ? ' same-agent' : ''}${unknownOrigin ? ' unknown-origin' : ''}`;
          const outcome = document.createElement('div');
          outcome.className = 'outcome';
          outcome.textContent = verification.passed ? 'PASS' : 'FAIL';
          card.append(outcome);
          const starts = verification.starts || [];
          starts.forEach((start) => {
            if (start.command) {
              const command = document.createElement('div');
              command.className = 'command';
              command.textContent = start.command;
              card.append(command);
            }
            const startMeta = document.createElement('div');
            startMeta.className = 'meta';
            const startMetaParts = [`event ${start.event_id}`, (
              typeof start.actor_id === 'string' && start.actor_id.trim()
                ? `started by ${start.actor_id}`
                : 'starting actor unknown'
            )];
            if (start.chronology === 'undetermined') {
              startMetaParts.push('start chronology undetermined');
            }
            if (start.change_chronology === 'undetermined') {
              startMetaParts.push('start/change chronology undetermined');
            }
            startMeta.textContent = startMetaParts.join(' · ');
            card.append(startMeta);
          });
          const conflictingCommand = starts.some(
            (start) => start.command && start.command !== verification.command
          );
          if ((!starts.some((start) => start.command) || conflictingCommand) && verification.command) {
            const command = document.createElement('div');
            command.className = 'command';
            command.textContent = conflictingCommand
              ? `Verification command · ${verification.command}`
              : verification.command;
            card.append(command);
          }
          const meta = document.createElement('div');
          meta.className = 'meta';
          const metaParts = [`event ${link.target_event_id}`];
          metaParts.push(typeof link.target_actor_id === 'string' && link.target_actor_id.trim()
            ? `result reported by ${link.target_actor_id}`
            : 'reporting actor unknown');
          if (verification.exit_code !== undefined) metaParts.push(`exit ${verification.exit_code}`);
          if (link.chronology === 'undetermined') metaParts.push('verification chronology undetermined');
          meta.textContent = metaParts.join(' · ');
          card.append(meta);
          (verification.unresolved || []).forEach((start) => {
            const incomplete = document.createElement('div');
            incomplete.className = 'incomplete';
            incomplete.textContent = start.reason === 'invalid_verification_command'
              ? `Invalid ${start.type} start command · ${start.event_id} · ${start.target_kind}`
              : start.reason === 'verification_start_after_finish'
                ? `Verification start occurred after finish · ${start.event_id} · ${start.target_kind}`
              : start.reason === 'verification_start_finish_chronology_undetermined'
                ? `Verification start/finish chronology undetermined · ${start.event_id} · ${start.target_kind}`
              : start.reason === 'verification_start_precedes_change'
                ? `Verification started before change · ${start.event_id} · ${start.target_kind}`
              : start.reason === 'verification_start_change_chronology_undetermined'
                ? `Verification start/change chronology undetermined · ${start.event_id} · ${start.target_kind}`
              : start.reason === 'conflicting_verification_command'
                ? `Conflicting ${start.type} start command · ${start.event_id} · ${start.target_kind}`
              : start.target_kind
              ? `Invalid ${start.type} start target · ${start.event_id} · ${start.target_kind}`
              : `Missing ${start.type} start · ${start.event_id}`;
            card.append(incomplete);
          });
          const provenance = document.createElement('div');
          provenance.className = 'provenance';
          provenance.textContent = unknownOrigin
            ? 'Test provenance unknown'
            : sameAgent
              ? 'Warning: implementation and test written by the same agent'
              : 'Test existed before this change';
          card.append(provenance);
          block.append(card);
        });

        (changeEvidence.corrections || []).forEach((link) => {
          const action = link.correction && link.correction.action;
          const card = document.createElement('div');
          card.className = `correction-card${action === 'reverted' ? ' reverted' : ''}`;
          const actionNode = document.createElement('div');
          actionNode.className = 'action';
          actionNode.textContent = link.reason === 'invalid_correction_detail'
            ? 'Human correction action invalid'
            : action === 'modified'
              ? 'Human modified this change'
              : action === 'reverted'
                ? 'Human reverted this change'
                : 'Human corrected this change';
          const meta = document.createElement('div');
          meta.className = 'meta';
          const actor = typeof link.source_actor_id === 'string' && link.source_actor_id.trim()
            ? `corrected by ${link.source_actor_id}`
            : 'correcting actor unknown';
          meta.textContent = `event ${link.source_event_id} · ${actor}`;
          card.append(actionNode, meta);
          if (link.reason === 'correction_precedes_change') {
            const incomplete = document.createElement('div');
            incomplete.className = 'incomplete';
            incomplete.textContent = 'Correction occurred before change';
            card.append(incomplete);
          } else if (link.chronology === 'undetermined') {
            const chronology = document.createElement('div');
            chronology.className = 'meta';
            chronology.textContent = 'correction chronology undetermined';
            card.append(chronology);
          }
          block.append(card);
        });

        const unresolved = changeEvidence.unresolved || [];
        const evidenceRelationshipTypes = new Set([
          'applies',
          'informed_by',
          'motivated_by',
          'preceded_by',
          'verified_by',
        ]);
        unresolved.forEach((link) => {
          const card = document.createElement('div');
          card.className = 'unresolved-evidence';
          const type = document.createElement('div');
          type.className = 'type';
          type.textContent = link.reason === 'invalid_verification_result'
            ? `Invalid verification result · ${link.type}`
            : link.reason === 'verification_precedes_change'
              ? `Verification finished before change · ${link.type}`
            : link.reason === 'verification_chronology_undetermined'
              ? `Verification chronology undetermined · ${link.type}`
            : link.reason === 'invalid_verification_exit_code'
              ? `Invalid verification exit code · ${link.type}`
            : link.reason === 'conflicting_verification_outcome'
                ? `Conflicting verification outcome · ${link.type}`
              : link.reason === 'invalid_verification_command'
                ? `Invalid verification command · ${link.type}`
                : link.reason === 'invalid_verification_test_origin'
                  ? `Invalid verification test provenance · ${link.type}`
                : link.reason === 'requirement_not_preceding_change'
                  ? `Requirement observed after change · ${link.type}`
                : link.reason === 'requirement_follows_decision'
                  ? `Requirement observed after decision · ${link.type}`
                : link.reason === 'requirement_chronology_undetermined'
                  ? `Requirement chronology undetermined · ${link.type}`
                : link.reason === 'invalid_requirement_detail'
                ? `Invalid requirement details · ${link.type}`
                 : link.reason === 'context_not_preceding_change'
                   ? `Context read after change · ${link.type}`
                : link.reason === 'context_follows_decision'
                   ? `Context read after decision · ${link.type}`
                 : link.reason === 'context_chronology_undetermined'
                   ? `Context chronology undetermined · ${link.type}`
                 : link.reason === 'compaction_not_preceding_change'
                   ? `Context compacted after change · ${link.type}`
                : link.reason === 'compaction_follows_decision'
                  ? `Context compacted after decision · ${link.type}`
                : link.reason === 'compaction_chronology_undetermined'
                  ? `Compaction chronology undetermined · ${link.type}`
                : link.reason === 'tool_chronology_undetermined'
                  ? `Tool chronology undetermined · ${link.type}`
                : link.reason === 'invalid_context_detail'
                  ? `Invalid context details · ${link.type}`
                  : link.reason === 'invalid_context_line_start'
                    ? `Invalid context line start · ${link.type}`
                  : link.reason === 'invalid_context_line_end'
                    ? `Invalid context line end · ${link.type}`
                  : link.reason === 'invalid_context_symbol'
                    ? `Invalid context symbol · ${link.type}`
                  : link.reason === 'invalid_compaction_detail'
                    ? `Invalid compaction details · ${link.type}`
                    : link.reason === 'invalid_tool_detail'
                      ? `Invalid tool details · ${link.type}`
                      : link.reason === 'invalid_tool_command'
                        ? `Invalid tool command · ${link.type}`
                        : link.reason === 'invalid_tool_result'
                          ? `Invalid tool result · ${link.type}`
                        : link.reason === 'invalid_tool_operation_status'
                        ? `Invalid tool operation status · ${link.type}`
                        : link.reason === 'invalid_tool_operation_name'
                          ? `Invalid tool operation name · ${link.type}`
                        : link.reason === 'invalid_tool_exit_code'
                          ? `Invalid tool exit code · ${link.type}`
                        : link.reason === 'tool_not_preceding_change'
                          ? `Tool occurred after change · ${link.type}`
                        : link.reason === 'tool_follows_decision'
                          ? `Tool occurred after decision · ${link.type}`
                          : link.reason === 'proposal_not_preceding_change'
                            ? `Change proposed after application · ${link.type}`
                          : link.reason === 'proposal_chronology_undetermined'
                            ? `Proposal chronology undetermined · ${link.type}`
                          : link.reason === 'invalid_decision_actor'
                            ? `Invalid decision actor · ${link.type}`
                            : link.target_kind
                              ? `Invalid evidence target · ${link.type}`
                              : evidenceRelationshipTypes.has(link.type)
                                ? `Missing evidence target · ${link.type}`
                                : `Missing relationship target · ${link.type}`;
          const eventId = document.createElement('div');
          eventId.className = 'event-id';
          const eventDetails = link.target_kind
            ? `${link.target_event_id} · ${link.target_kind}`
            : link.target_event_id;
          eventId.textContent = link.decision_event_id
            ? `${eventDetails} · decision event ${link.decision_event_id}`
            : eventDetails;
          card.append(type, eventId);
          block.append(card);
        });
        const coverage = changeEvidence.coverage || {};
        const missing = coverage.missing || [];
        missing.forEach((kind) => {
          const warning = document.createElement('div');
          warning.className = 'evidence-missing';
          warning.textContent = `Missing ${kind} evidence`;
          block.append(warning);
        });
        const unresolvedCount = coverage.unresolved_count === undefined
          ? unresolved.length
          : coverage.unresolved_count;
        const unknownTestOriginCount = coverage.unknown_test_origin_count || 0;
        const sameAgentTestCount = coverage.same_agent_test_count || 0;
        const failedVerificationCount = coverage.failed_verification_count || 0;
        const integrityIssueCount = coverage.integrity_issue_count || 0;
        const completeness = document.createElement('div');
        const incomplete = missing.length || unresolvedCount || unknownTestOriginCount || sameAgentTestCount || failedVerificationCount || integrityIssueCount;
        completeness.className = `evidence-completeness${incomplete ? ' incomplete' : ''}`;
        completeness.textContent = incomplete
          ? `Evidence incomplete · ${missing.length} missing categor${missing.length === 1 ? 'y' : 'ies'} · ${unresolvedCount} unresolved reference${unresolvedCount === 1 ? '' : 's'} · ${integrityIssueCount} change integrity issue${integrityIssueCount === 1 ? '' : 's'} · ${unknownTestOriginCount} test${unknownTestOriginCount === 1 ? '' : 's'} with unknown provenance · ${sameAgentTestCount} same-agent test${sameAgentTestCount === 1 ? '' : 's'} · ${failedVerificationCount} failed verification${failedVerificationCount === 1 ? '' : 's'}`
          : 'Core evidence complete';
        block.append(completeness);
        wrap.append(block);
      }

      const provenance = detail.context_provenance || {};
      const actorTimeline = (provenance.actors || []).find(
        (timeline) => timeline.actor_id === event.actor.id
      );
      if (actorTimeline && actorTimeline.entries.length) {
        const block = document.createElement('div');
        block.className = 'inspector-block context-provenance';
        const label = document.createElement('div');
        label.className = 'inspector-label';
        label.textContent = 'CONTEXT PROVENANCE';
        const timeline = document.createElement('div');
        timeline.className = 'provenance-timeline';
        const availability = (field) => field && field.availability === 'available'
          ? field.value
          : field && field.availability || 'absent';
        actorTimeline.entries.forEach((entry) => {
          const card = document.createElement('div');
          card.className = `provenance-entry${entry.event_id === event.event_id ? ' selected' : ''}${entry.freshness === 'stale' ? ' stale' : ''}`;
          const title = document.createElement('div');
          title.className = 'title';
          title.textContent = `${entry.kind} · ${entry.event_id}`;
          card.append(title);
          const snapshot = document.createElement('div');
          snapshot.className = 'detail';
          snapshot.textContent = `snapshot commit ${availability(entry.repository?.commit)} · worktree sha256 ${availability(entry.repository?.worktree_sha256)}`;
          card.append(snapshot);
          if (entry.locator) {
            const locator = document.createElement('div');
            locator.className = 'detail';
            const path = entry.locator.normalized_path || entry.locator.raw_path || 'path unavailable';
            const range = entry.locator.line_start === undefined
              ? ''
              : `:${entry.locator.line_start}${entry.locator.line_end === undefined ? '' : `-${entry.locator.line_end}`}`;
            locator.textContent = `locator ${path}${range}${entry.locator.symbol ? ` · ${entry.locator.symbol}` : ''}`;
            card.append(locator);
          }
          if (entry.content_sha256 || entry.preimage_sha256) {
            const hash = document.createElement('div');
            hash.className = 'detail';
            const hashField = entry.content_sha256 || entry.preimage_sha256;
            const hashName = entry.content_sha256 ? 'content sha256' : 'preimage sha256';
            hash.textContent = `${hashName} ${availability(hashField)} · freshness ${entry.freshness || 'unknown'}`;
            card.append(hash);
          }
          if (entry.kind === 'context.search') {
            const query = document.createElement('div');
            query.className = 'detail';
            query.textContent = `query ${entry.query === undefined ? 'unavailable' : entry.query}`;
            const matches = document.createElement('div');
            matches.className = 'detail';
            matches.textContent = entry.canonical_matches.length
              ? `matches ${entry.canonical_matches.join(', ')}`
              : 'matches empty';
            card.append(query, matches);
          }
          if (entry.kind === 'context.compacted') {
            const boundary = document.createElement('div');
            boundary.className = 'detail';
            const sources = (entry.summarizes || []).map(
              (source) => `${source.event_id}${source.chronology ? ` ${source.chronology}` : ` ${source.status || source.kind || 'unknown'}`}`
            );
            boundary.textContent = sources.length
              ? `compaction boundary summarizes ${sources.join(', ')}`
              : 'compaction boundary has no explicit sources';
            card.append(boundary);
          }
          (entry.diagnostics || []).forEach((diagnostic) => {
            const warning = document.createElement('div');
            warning.className = 'diagnostic';
            warning.textContent = diagnostic.code === 'stale_context_read'
              ? `stale read for change ${diagnostic.change_event_id}`
              : diagnostic.code === 'divergent_repository_snapshot'
                ? `divergent repository snapshot · ${diagnostic.fields.join(', ')}`
                : diagnostic.code.replaceAll('_', ' ');
            card.append(warning);
          });
          (entry.comparisons || entry.reads || []).forEach((comparison) => {
            const status = document.createElement('div');
            status.className = comparison.freshness === 'stale' ? 'diagnostic' : 'detail';
            const counterpart = entry.kind === 'context.read'
              ? comparison.change_event_id
              : comparison.read_event_id;
            status.textContent = `${comparison.freshness} vs ${counterpart} · ${comparison.chronology}`;
            card.append(status);
          });
          timeline.append(card);
        });
        block.append(label, timeline);
        wrap.append(block);
      }

      if (hasUsage) {
        const usageBlock = document.createElement('div');
        usageBlock.className = 'inspector-block';
        const duration = event.operation && typeof event.operation.duration_ms === 'number' && Number.isFinite(event.operation.duration_ms)
          ? `${event.operation.duration_ms}ms`
          : 'n/a';
        usageBlock.innerHTML = `
          <div class="inspector-label">USAGE</div>
          <div class="usage-inline-row">
            <div><div class="k">input</div><div class="v" style="color:${cssVar('--run')}">${usageValue(usage.input_tokens)}</div></div>
            <div><div class="k">output</div><div class="v" style="color:${cssVar('--ok')}">${usageValue(usage.output_tokens)}</div></div>
            <div><div class="k">total</div><div class="v" style="color:${cssVar('--accent')}">${usageValue(usage.total_tokens)}</div></div>
            <div><div class="k">cost</div><div class="v" style="color:${cssVar('--warn')}">${costValue(usage.cost_usd, 4)}</div></div>
            <div><div class="k">latency</div><div class="v" style="color:${cssVar('--text')}">${escapeHtml(duration)}</div></div>
          </div>`;
        wrap.append(usageBlock);
      }
      if (Object.keys(attributes).length) {
        const block = document.createElement('div');
        block.className = 'inspector-block';
        block.innerHTML = `<div class="io-title in">ATTRIBUTES</div><pre class="io-pre"></pre>`;
        block.querySelector('pre').textContent = JSON.stringify(attributes, null, 2);
        wrap.append(block);
      }
      const attachPayloadFooter = (block) => {
        if (payloadOmitted) {
          const note = document.createElement('div');
          note.className = 'io-truncated';
          note.textContent = `payload omitted (metadata-only) · ${meta.original_bytes || 0} original bytes · sha256 ${String(meta.sha256 || '').slice(0, 12)}…`;
          block.append(note);
          return;
        }
        if (meta && meta.truncated) {
          const note = document.createElement('div');
          note.className = 'io-truncated';
          note.textContent = `payload truncated on UTF-8 boundary · sha256 ${String(meta.sha256 || '').slice(0, 12)}…`;
          block.append(note);
        }
        if (!dataProvider.supportsLazyPayload) return;
        const loadBtn = document.createElement('button');
        loadBtn.type = 'button';
        loadBtn.className = 'io-load-btn';
        loadBtn.textContent = 'Load retained payload';
        loadBtn.addEventListener('click', async () => {
          loadBtn.disabled = true;
          loadBtn.textContent = 'Loading…';
          try {
            const full = await fetchJson(`/api/v1/runs/${encodeURIComponent(detail.run.trace_id)}/events/${encodeURIComponent(event.event_id)}/payload`);
            const preview = full.payload && full.payload.preview;
            block.querySelector('pre').textContent = typeof preview === 'string' ? preview : JSON.stringify(preview, null, 2);
            loadBtn.remove();
            block.querySelectorAll('.io-truncated').forEach((el) => el.remove());
          } catch (error) {
            loadBtn.disabled = false;
            loadBtn.textContent = 'Load retained payload (failed, retry)';
          }
        });
        block.append(loadBtn);
      };
      if (input) {
        const block = document.createElement('div');
        block.className = 'inspector-block';
        block.innerHTML = `<div class="io-title in">▸ INPUT</div><pre class="io-pre"></pre>`;
        block.querySelector('pre').textContent = input;
        if (payloadBlockIsInput) attachPayloadFooter(block);
        wrap.append(block);
      }
      if (output) {
        const block = document.createElement('div');
        block.className = 'inspector-block';
        block.innerHTML = `<div class="io-title out">◂ OUTPUT</div><pre class="io-pre"></pre>`;
        block.querySelector('pre').textContent = output;
        if (payloadBlockIsOutput) attachPayloadFooter(block);
        wrap.append(block);
      }
      if (hasPayloadPreview && !payloadBlockIsInput && !payloadBlockIsOutput) {
        const block = document.createElement('div');
        block.className = 'inspector-block';
        block.innerHTML = `<div class="io-title in">▸ PAYLOAD</div><pre class="io-pre"></pre>`;
        block.querySelector('pre').textContent = typeof payload.preview === 'string' ? payload.preview : JSON.stringify(payload.preview, null, 2);
        attachPayloadFooter(block);
        wrap.append(block);
      }
      if (payloadOmitted) {
        const block = document.createElement('div');
        block.className = 'inspector-block';
        block.innerHTML = `<div class="io-title in">▸ PAYLOAD</div><pre class="io-pre">omitted (metadata-only)</pre>`;
        attachPayloadFooter(block);
        wrap.append(block);
      }
      inspectorEl.replaceChildren(wrap);
    }

    function renderOverview(detail, horizonAgents) {
      const run = detail.run;
      const visibleEvents = eventsAtHorizon(detail);
      const usage = usageFor(visibleEvents);
      const modelReq = visibleEvents.filter((e) => e.kind === 'model.request.started' || e.kind === 'model.request').length;
      const toolReq = visibleEvents.filter((e) => e.kind.startsWith('tool.call.started') || e.kind === 'tool.call.failed').length;
      const msgReq = visibleEvents.filter((e) => e.kind.startsWith('message.')).length;
      const reqTotal = Math.max(1, modelReq + toolReq + msgReq);

      const wrap = document.createElement('div');
      wrap.className = 'empty-note';
      wrap.innerHTML = `
        <div class="inspector-label">RUN OVERVIEW</div>
        <div class="overview-desc">${escapeHtml(run.trace_id)} — a live causal view of a multi-agent run. <span class="em">Click any agent</span> in the stage to inspect its tokens, payloads, timeline and hand-offs.</div>
        <div class="overview-rows"></div>
        <div class="section-label" style="margin:20px 0 10px">HOW REQUESTS WERE MADE</div>
        <div class="req-breakdowns"></div>
        <div class="section-label" style="margin:18px 0 10px">OUTCOME COST ATTRIBUTION</div>
        <div class="outcome-cost"></div>
        <div class="section-label" style="margin:18px 0 10px">TOP TOOLS &amp; MODELS</div>
        <div class="top-tools"></div>`;

      const rows = wrap.querySelector('.overview-rows');
      [
        ['Trace', run.trace_id, '--text'],
        ...(detail.payload_mode === 'metadata-only' ? [['Payload mode', 'metadata-only · payload bodies omitted', '--warn']] : []),
        ['Agents spawned', `${horizonAgents.length} / ${run.actor_count}`, '--orch'],
        ['Total requests', String(modelReq + toolReq), '--run'],
        ['Tokens (in/out)', `${usageValue(usage.input_tokens)} / ${usageValue(usage.output_tokens)}`, '--ok'],
        ['Estimated cost', costValue(usage.cost_usd, 2), '--warn'],
        ['Security audit', `${detail.security?.coverage?.result || 'no_observed_path'} · ${detail.security?.coverage?.status || 'incomplete'} coverage`, detail.security?.findings?.length ? '--err' : '--warn'],
        ...((detail.security?.coverage?.reasons || []).length ? [['Security coverage reason', detail.security.coverage.reasons.join(', '), '--warn']] : []),
      ].forEach(([k, v, color]) => {
        const row = document.createElement('div');
        row.className = 'overview-row';
        row.innerHTML = `<span class="k">${k}</span><span class="v" style="color:${cssVar(color)}">${escapeHtml(v)}</span>`;
        rows.append(row);
      });

      const outcomeCost = wrap.querySelector('.outcome-cost');
      const attribution = detail.outcome_cost;
      if (attribution) {
        const notice = document.createElement('div');
        notice.className = 'notice';
        notice.textContent = 'Warning associations are non-exclusive and must not be summed.';
        outcomeCost.append(notice);
        renderUsageTable(outcomeCost, [
          { bucket: 'attributed', usage: attribution.allocation.attributed },
          { bucket: 'pending', usage: attribution.allocation.pending },
          { bucket: 'unattributed', usage: attribution.allocation.unattributed },
        ], 'bucket', 'allocation');
        renderUsageTable(outcomeCost, attribution.by_hunk.map((row) => ({
          hunk: `${row.change_event_id} · ${row.observed_outcome}`,
          usage: row.usage,
        })), 'hunk', 'valid hunk');
        renderUsageTable(outcomeCost, attribution.by_actor, 'actor_id', 'actor');
        renderUsageTable(outcomeCost, attribution.by_operation, 'operation', 'operation');
        renderUsageTable(outcomeCost, attribution.by_warning_code, 'warning_code', 'warning code (non-exclusive)');
      }

      const breakdowns = wrap.querySelector('.req-breakdowns');
      [
        ['model requests', modelReq, '--run'],
        ['tool calls', toolReq, '--ok'],
        ['agent messages', msgReq, '--accent'],
      ].forEach(([label, count, color]) => {
        const node = document.createElement('div');
        node.className = 'req-breakdown';
        node.innerHTML = `
          <div class="top"><span class="name">${label}</span><span class="count">${count}</span></div>
          <div class="req-bar-track"><div class="req-bar-fill" style="width:${(count / reqTotal) * 100}%;background:${cssVar(color)}"></div></div>`;
        breakdowns.append(node);
      });

      const toolCount = {};
      visibleEvents.filter((e) => e.kind.startsWith('tool.call.started') || e.kind === 'tool.call.failed' || e.kind === 'model.request.started').forEach((e) => {
        const name = (e.operation && e.operation.name) || e.kind;
        toolCount[name] = (toolCount[name] || 0) + 1;
      });
      const topTools = wrap.querySelector('.top-tools');
      Object.entries(toolCount).sort((a, b) => b[1] - a[1]).slice(0, 6).forEach(([name, count]) => {
        const row = document.createElement('div');
        row.className = 'tool-row';
        row.innerHTML = `<span class="name">${escapeHtml(name)}</span><span class="count">×${count}</span>`;
        topTools.append(row);
      });
      if (!Object.keys(toolCount).length) {
        const empty = document.createElement('div');
        empty.className = 'tool-row';
        empty.innerHTML = `<span class="name" style="color:var(--faint)">no requests yet</span>`;
        topTools.append(empty);
      }

      inspectorEl.replaceChildren(wrap);
    }

    /* ---------- WARNINGS DRAWER ---------- */
    function renderWarningsDrawer(detail, warnings, findings) {
      warningsDrawerEl.hidden = !warningsOpen;
      warningsBackdropEl.hidden = !warningsOpen;
      if (!warningsOpen) return;
      const items = [
        ...warnings.map((w) => ({ code: w.code, actor: w.actor_id, summary: w.summary, evidence: w.evidence, active: w.active, time: eventTime(detail, w.event_id), actorId: w.actor_id, eventId: w.event_id, detectedAt: w.detected_at, resolvedAt: w.resolved_at })),
        ...findings.map((f) => ({ code: f.code, actor: f.kind, summary: f.message, time: eventTime(detail, f.event_id), actorId: null, eventId: f.event_id, detectedAt: f.detected_at, resolvedAt: null })),
      ];
      const head = document.createElement('div');
      head.className = 'drawer-head';
      head.innerHTML = `
        <div class="title-row"><span class="dot"></span><span class="title">Findings</span><span class="subtitle">heuristics, not diagnoses</span></div>
        <button type="button" aria-label="Close warnings">✕</button>`;
      head.querySelector('button').addEventListener('click', () => { warningsOpen = false; renderDetail(currentDetail); });

      const body = document.createElement('div');
      body.className = 'drawer-body';
      if (detail.warning_policy) {
        const policy = detail.warning_policy;
        const policyCard = document.createElement('div');
        policyCard.className = 'warn-card';
        const heading = document.createElement('div');
        heading.className = 'summary';
        heading.textContent = `Warning policy ${policy.path} · version ${policy.version} · restart required`;
        const result = document.createElement('div');
        result.className = 'actor';
        result.textContent = `Suppressed ${policy.suppressed_counts.total} · LOOP ${policy.suppressed_counts.by_code.LOOP} · RETRY ${policy.suppressed_counts.by_code.RETRY}`;
        const rules = document.createElement('div');
        rules.className = 'actor';
        rules.textContent = `Effective rules: ${JSON.stringify(policy.rules)}`;
        policyCard.append(heading, result, rules);
        body.append(policyCard);
      }
      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-drawer';
        empty.textContent = 'No warnings or findings for this run.';
        body.append(empty);
      }
      items.forEach((item) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'warn-card';
        card.title = `detected ${text(item.detectedAt)} · resolved ${text(item.resolvedAt)}`;
        card.innerHTML = `
          <div class="head">
            <span class="code" style="color:${cssVar('--warn')};background:rgba(255,180,84,.16)">${escapeHtml(item.code)}</span>
            <span class="actor">${escapeHtml(text(item.actor))}</span>
            <span class="spacer"></span>
            <span class="time">${item.time !== null ? clock(item.time) : '—'}</span>
          </div>
          <div class="summary">${escapeHtml(item.summary)}</div>
          ${item.active === false ? '<div class="actor">resolved</div>' : ''}
          ${item.evidence ? `<div class="actor">evidence ${escapeHtml(item.evidence)}</div>` : ''}`;
        card.addEventListener('click', () => {
          warningsOpen = false;
          selectedEventId = item.eventId || null;
          selectedAgentId = item.actorId || selectedAgentId;
          renderDetail(currentDetail);
        });
        body.append(card);
      });
      warningsDrawerEl.replaceChildren(head, body);
    }

    function eventTime(detail, eventId) {
      const event = detail.events.find((e) => e.event_id === eventId);
      return event ? event.offset_seconds : null;
    }

    /* ---------- PLAYBACK ---------- */
    function syncPlayback(detail) {
      const duration = durationOf(detail);
      const terminal = detail.run.state === 'completed' || detail.run.state === 'failed';
      if (playbackTraceId !== detail.run.trace_id) {
        playbackTraceId = detail.run.trace_id;
        playbackTime = duration;
        liveFollow = !terminal;
        playing = false;
      }
      if (liveFollow) playbackTime = duration;
      playbackTime = Math.min(Math.max(playbackTime, 0), duration);
      scrubberEl.value = String(duration > 0 ? Math.round((playbackTime / duration) * 1000) : 0);
      playbackToggleEl.textContent = playing ? '❚❚' : '▶';
      playbackClockEl.textContent = `${clock(playbackTime)} / ${clock(duration)}`;
      playbackModeEl.textContent = liveFollow ? 'streaming' : (playbackTime >= duration ? 'EOF · frozen' : (playing ? `${playbackSpeed}× replay` : 'paused'));
      if (!dataProvider.live && liveFollow) playbackModeEl.textContent = 'offline snapshot';
      jumpLiveEl.classList.toggle('live', playbackTime >= duration);
      [...speedGroupEl.querySelectorAll('button')].forEach((button) => {
        button.setAttribute('aria-current', Number(button.dataset.speed) === playbackSpeed ? 'true' : 'false');
      });
    }

    function setPlaying(next) {
      playing = next;
      if (playing) liveFollow = false;
      startPlaybackTimer();
      renderDetail(currentDetail);
    }

    function startPlaybackTimer() {
      if (playbackTimer) window.clearInterval(playbackTimer);
      playbackTimer = null;
      if (!playing) return;
      playbackTimer = window.setInterval(() => {
        const duration = durationOf(currentDetail);
        playbackTime = Math.min(duration, playbackTime + 0.25 * playbackSpeed);
        if (playbackTime >= duration) setPlaying(false);
        else renderDetail(currentDetail);
      }, 250);
    }

    /* ---------- HELPERS ---------- */
    function clock(seconds) {
      const safe = Math.max(0, Math.floor(Number(seconds) || 0));
      return `${String(Math.floor(safe / 60)).padStart(2, '0')}:${String(safe % 60).padStart(2, '0')}`;
    }

    function compactNumber(value) {
      const number = Number(value) || 0;
      if (number >= 1000000) return `${(number / 1000000).toFixed(1)}M`;
      if (number >= 1000) return `${(number / 1000).toFixed(1)}k`;
      return String(Math.round(number));
    }

    function initialVisibleLimit() {
      return window.innerWidth <= 720 ? 40 : 160;
    }

    function apiPath(path) {
      if (!accessToken) return path;
      const separator = path.includes('?') ? '&' : '?';
      return `${path}${separator}token=${encodeURIComponent(accessToken)}`;
    }

    async function init() {
      try {
        await initReview();
        await refreshAuthoritative();
        if (dataProvider.live) connectEvents();
      } catch (error) {
        warningCountEl.textContent = '!';
        console.error('Failed to load runs', error);
        if (dataProvider.live) scheduleInit(1500);
      }
    }

    async function refreshAuthoritative() {
      const data = await fetchJson('/api/v1/runs');
      renderRuns(data);
      if (selectedTraceId) {
        const detail = await fetchJson(`/api/v1/runs/${encodeURIComponent(selectedTraceId)}`);
        renderDetail(detail);
      }
    }

    function scheduleInit(delay) {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        init();
      }, delay);
    }

    function connectEvents() {
      if (events) events.close();
      const stream = new EventSource(apiPath(`/api/v1/events?cursor=${cursor}`));
      events = stream;
      const refresh = () => init();
      stream.addEventListener('event', refresh);
      stream.addEventListener('finding', refresh);
      stream.addEventListener('source', refresh);
      stream.addEventListener('heartbeat', refresh);
      stream.addEventListener('reset', async (message) => {
        if (events !== stream) return;
        stream.close();
        events = null;
        cursor = JSON.parse(message.data).current_cursor;
        try {
          await refreshAuthoritative();
          if (!events) connectEvents();
        } catch (error) {
          console.error('Failed to reset live history', error);
          scheduleInit(1000);
        }
      });
      stream.onerror = () => {
        if (events !== stream) return;
        stream.close();
        events = null;
        scheduleInit(1000);
      };
    }

    init();
  </script>
</body>
</html>
